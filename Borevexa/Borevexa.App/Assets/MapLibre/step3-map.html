<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Borevexa MapLibre ontwerpviewer</title>
  <link href="./maplibre-gl.css" rel="stylesheet" />
  <script src="./maplibre-gl.js"></script>
  <style>
    html, body, #map { height: 100%; margin: 0; overflow: hidden; background: #e8f3ee; }
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .maplibregl-ctrl-logo, .maplibregl-ctrl-attrib { display: none !important; }
    .maplibregl-ctrl-scale {
      margin-left: 12px !important;
      margin-bottom: 8px !important;
      background: rgba(255,255,255,.86) !important;
      border-color: rgba(15,23,42,.55) !important;
      color: #0f172a !important;
    }
    body.map-locked .maplibregl-ctrl-zoom-in,
    body.map-locked .maplibregl-ctrl-zoom-out {
      pointer-events: none !important;
      opacity: .45;
    }
    body.report-capture .map-toolbar,
    body.report-capture .maplibregl-ctrl-group,
    body.report-capture .maplibregl-ctrl-zoom-in,
    body.report-capture .maplibregl-ctrl-zoom-out,
    body.report-capture .status,
    body.report-capture .credit,
    body.capture-controls-hidden .map-toolbar,
    body.capture-controls-hidden .maplibregl-ctrl-group,
    body.capture-controls-hidden .maplibregl-ctrl-zoom-in,
    body.capture-controls-hidden .maplibregl-ctrl-zoom-out,
    body.capture-controls-hidden .status,
    body.capture-controls-hidden .credit {
      display: none !important;
    }
    .credit {
      position: absolute;
      right: 12px;
      bottom: 5px;
      z-index: 3;
      color: #1d4ed8;
      font-size: 12px;
      background: rgba(255,255,255,.72);
      padding: 2px 4px;
    }
    .status {
      position: absolute;
      left: 150px;
      bottom: 8px;
      z-index: 4;
      color: #0f172a;
      font-size: 12px;
      background: rgba(255,255,255,.86);
      border: 1px solid rgba(148,163,184,.5);
      padding: 5px 7px;
    }
    body.workdrawing-mode #map { background: #ffffff; }
    body.workdrawing-mode .workdrawing-chrome { display: block; }
    .workdrawing-chrome { display: none; pointer-events: none; position: absolute; z-index: 5; color: #0f172a; font-size: 12px; }
    .workdrawing-frame { inset: 14px; border: 2px solid rgba(15,23,42,.78); background: transparent; }
    .workdrawing-north { right: 24px; top: 24px; width: 54px; height: 72px; text-align: center; font-weight: 800; }
    .workdrawing-north .arrow { width: 0; height: 0; margin: 0 auto 4px; border-left: 13px solid transparent; border-right: 13px solid transparent; border-bottom: 42px solid #0f172a; }
    .workdrawing-titleblock { right: 24px; bottom: 24px; width: 310px; background: rgba(255,255,255,.92); border: 1px solid #0f172a; }
    .workdrawing-titleblock div { display: grid; grid-template-columns: 96px 1fr; border-top: 1px solid #94a3b8; }
    .workdrawing-titleblock div:first-child { border-top: 0; }
    .workdrawing-titleblock b, .workdrawing-titleblock span { padding: 5px 7px; }
    .workdrawing-titleblock b { background: #e2e8f0; border-right: 1px solid #94a3b8; }
    .workdrawing-scale { left: 24px; bottom: 24px; width: 170px; background: rgba(255,255,255,.92); border: 1px solid #0f172a; padding: 7px; }
    .workdrawing-scale-line { height: 8px; display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; border: 1px solid #0f172a; margin-bottom: 5px; }
    .workdrawing-scale-line span:nth-child(odd) { background: #0f172a; }
    .workdrawing-scale-label { display: flex; justify-content: space-between; font-weight: 700; }
    .klic-popup {
      min-width: 220px;
      max-height: 360px;
      overflow: auto;
      color: #071422;
      font-size: 12px;
      line-height: 1.35;
    }
    .klic-popup strong {
      display: block;
      margin-bottom: 6px;
      color: #007A5A;
      font-size: 13px;
    }
    .klic-popup-row {
      display: grid;
      grid-template-columns: 82px 1fr;
      gap: 8px;
      padding: 2px 0;
      border-top: 1px solid #EDF1F4;
    }
    .klic-popup-label {
      color: #587080;
      font-weight: 600;
    }
    .klic-popup-docs {
      margin-top: 8px;
      padding-top: 6px;
      border-top: 1px solid #DDE7EC;
    }
    .klic-popup-docs-title {
      color: #587080;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .klic-popup-doc {
      width: 100%;
      display: block;
      margin: 3px 0;
      padding: 5px 7px;
      border: 1px solid #CFE0E8;
      background: #F8FAFB;
      color: #071422;
      text-align: left;
      cursor: pointer;
      font: inherit;
    }
    .klic-popup-doc:hover { border-color: #007A5A; color: #007A5A; }
    .trace-label-layer {
      position: absolute;
      inset: 0;
      z-index: 7;
      pointer-events: none;
      overflow: hidden;
    }
    .trace-vector-layer {
      position: absolute;
      inset: 0;
      z-index: 6;
      pointer-events: none;
      overflow: hidden;
    }
    .trace-vector-layer svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: visible;
    }
    .trace-label {
      position: absolute;
      transform: translate(-50%, -50%);
      padding: 2px 5px;
      border: 1px solid rgba(225, 29, 72, .45);
      border-radius: 999px;
      background: rgba(255, 255, 255, .94);
      color: #111827;
      font-size: 11px;
      font-weight: 800;
      line-height: 1.15;
      box-shadow: 0 1px 3px rgba(15, 23, 42, .18);
      white-space: nowrap;
    }
    .trace-label.length {
      border-color: rgba(55, 65, 81, .35);
      color: #374151;
      font-weight: 700;
      font-size: 10.5px;
    }
    .map-toolbar {
      position: absolute;
      left: 58px;
      top: 10px;
      z-index: 8;
      display: flex;
      align-items: center;
      gap: 3px;
      min-height: 30px;
      padding: 3px 5px;
      border: 1px solid #b8c1ca;
      background: linear-gradient(#f7f8f9, #e4e8ec);
      box-shadow: 0 1px 2px rgba(15, 23, 42, .16);
      font-size: 12px;
      user-select: none;
    }
    .map-tool-button {
      min-width: 30px;
      height: 24px;
      padding: 0 8px;
      border: 1px solid #b9c3cb;
      background: #f8fafb;
      color: #17212b;
      font: 600 12px/1 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      cursor: pointer;
    }
    .map-tool-button:hover { background: #eef2f5; border-color: #8d99a6; }
    .map-tool-button.active {
      background: #d7dde3;
      border-color: #5f6b78;
      box-shadow: inset 0 1px 2px rgba(15, 23, 42, .25);
    }
    .map-tool-button.locked {
      background: #3f4750;
      border-color: #3f4750;
      color: #fff;
    }
    .map-tool-separator {
      width: 1px;
      height: 22px;
      background: #bac3cb;
      margin: 0 3px;
    }
    .trace-label.total {
      border-color: rgba(225, 29, 72, .55);
      color: #E11D48;
      font-size: 12px;
    }
    .trace-label.klic-crossing {
      border-color: rgba(15, 23, 42, .72);
      background: #ffffff;
      color: #0f172a;
      font-size: 12px;
      font-weight: 900;
      padding: 3px 6px;
      box-shadow: 0 1px 5px rgba(15, 23, 42, .24);
    }
    .machine-symbol-layer {
      position: absolute;
      inset: 0;
      z-index: 7;
      pointer-events: none;
      overflow: hidden;
    }
    .machine-symbol-layer svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: visible;
    }
    .machine-symbol-layer polygon {
      fill: rgba(255, 255, 255, .58);
      stroke: #000;
      stroke-width: 3;
      vector-effect: non-scaling-stroke;
    }
    .machine-symbol-layer text {
      fill: #000;
      font: 700 12px/1 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      paint-order: stroke;
      stroke: #fff;
      stroke-width: 3px;
      stroke-linejoin: round;
    }
    .boring-info-layer {
      position: absolute;
      inset: 0;
      z-index: 6;
      pointer-events: none;
      overflow: hidden;
    }
    .boring-info-layer svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: visible;
      pointer-events: none;
    }
    .boring-info-card {
      position: absolute;
      max-width: 280px;
      min-width: 170px;
      padding: 7px 9px;
      border: 1px solid rgba(15, 23, 42, .38);
      border-radius: 4px;
      background: rgba(255, 255, 255, .94);
      color: #111827;
      box-shadow: 0 2px 5px rgba(15, 23, 42, .16);
      font-size: 11px;
      line-height: 1.25;
      pointer-events: auto;
      cursor: move;
      user-select: none;
    }
    .boring-info-card strong {
      display: block;
      font-size: 12px;
      margin-bottom: 2px;
    }
    .boring-info-card span {
      display: block;
      color: #475569;
      margin-bottom: 3px;
    }
    .boring-info-card ul {
      margin: 3px 0 0;
      padding-left: 15px;
    }
    body.boreline-map-mode .map-toolbar {
      display: none;
    }
</style>
</head>
<body>
  <div id="map"></div>
  <div id="traceOverlay" class="trace-vector-layer"></div>
  <div id="mapToolbar" class="map-toolbar" role="toolbar" aria-label="GIS gereedschap">
    <button class="map-tool-button active" data-tool="select" type="button" title="Handje: kaart verplaatsen zonder popups">Hand</button>
    <button class="map-tool-button" data-tool="line" type="button" title="Lijn tekenen">Lijn</button>
    <button class="map-tool-button" data-tool="delete" type="button" title="Lijn of maatvoering verwijderen">Wis</button>
    <span class="map-tool-separator" aria-hidden="true"></span>
    <button class="map-tool-button" data-tool="dimension" type="button" title="Maatvoering toevoegen">Maat</button>
    <button class="map-tool-button" id="clearDimensionsButton" type="button" title="Alle maatvoering verwijderen">Wis maat</button>
  </div>
  <div id="traceLabels" class="trace-label-layer"></div>
  <div id="boringInfo" class="boring-info-layer"></div>
  <div id="machineSymbols" class="machine-symbol-layer"></div>
  <div id="status" class="status">Kaart laden...</div>
  <div class="credit">MapLibre GL JS | PDOK | Esri | EPSG:28992 workflow</div>
  <div class="workdrawing-chrome workdrawing-frame"></div>
  <div class="workdrawing-chrome workdrawing-north"><div class="arrow"></div><div>N</div></div>
  <div class="workdrawing-chrome workdrawing-scale"><div class="workdrawing-scale-line"><span></span><span></span><span></span><span></span></div><div class="workdrawing-scale-label"><span>0</span><span id="workDrawingScaleBarText">20 m</span></div></div>
  <div class="workdrawing-chrome workdrawing-titleblock"><div><b>Project</b><span id="workDrawingProject">Borevexa prescan</span></div><div><b>Onderdeel</b><span>Werktekening HDD</span></div><div><b>Schaal</b><span id="workDrawingScaleText">1:200</span></div><div><b>Datum</b><span id="workDrawingDate"></span></div></div>
  <script>
    window.addEventListener("error", event => {
      send({ type: "error", message: event.message, source: event.filename, line: event.lineno });
    });

    const center = [5.7388, 53.2056];
    let mapReady = false;
    let projectLayers = [];
    let projectLayerVisibility = {};
    let environmentHighlightData = null;
    let projectLayersFitted = false;
    let broSoundings = [];

    let selectedBroSoundingId = "";
    let selectedBroSoundingIds = [];
    let broSoundingClickRegistered = false;
    let baseMapVisible = true;
    let currentBaseStyleId = "pdok-brt";
    let activeFeaturePopup = null;

    let activeFeatureMeta = null;

    const registeredProjectClickLayers = new Set();
    const overlays = { parcels: false, buildings: false, addresses: false, bgt: true, bagImport: true, ahn4Dtm: true, ahn4Dsm: false, broGeomorphology: false, broSoilMap: false, broGroundwaterGhg: false, broGroundwaterGlg: false, broGroundwaterGvg: false, broGroundwaterGt: false, broGroundwaterDocumentation: false, klic: true, klicBuffer: true, designImport: true, customImport: true };

    let dimensionId = 1;
    let activeSketchLineId = "";
    let activeDimensionStart = null;
    const sketchLineFeatures = [];
    const dimensionFeatures = [];
    const dimensionLabelFeatures = [];

      "pdok-gray": rasterStyle("pdok", "https://service.pdok.nl/brt/achtergrondkaart/wmts/v2_0/grijs/EPSG:3857/{z}/{x}/{y}.png", "PDOK BRT grijs"),
      "pdok-pastel": rasterStyle("pdok", "https://service.pdok.nl/brt/achtergrondkaart/wmts/v2_0/pastel/EPSG:3857/{z}/{x}/{y}.png", "PDOK BRT pastel"),

      "pdok-aerial": rasterStyle("pdok", "https://service.pdok.nl/hwh/luchtfotorgb/wmts/v1_0?SERVICE=WMTS&REQUEST=GetTile&VERSION=1.0.0&LAYER=Actueel_ortho25&STYLE=default&FORMAT=image/jpeg&tileMatrixSet=EPSG:3857&tileMatrix={z}&tileRow={y}&tileCol={x}", "PDOK luchtfoto"),
      "osm": rasterStyle("osm", "https://tile.openstreetmap.org/{z}/{x}/{y}.png", "OpenStreetMap"),
      "esri-topo-rd": rasterStyle("esri", "https://services.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}", "Esri Topo"),
      "esri-open-topo": rasterStyle("esri", "https://services.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/{z}/{y}/{x}", "Esri Open Topo"),
      "esri-aerial": rasterStyle("esri", "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}", "Esri luchtfoto")
    };
    const borelineBaseStyles = new Set(["pdok-brt", "pdok-gray", "pdok-pastel", "pdok-aerial", "osm"]);
    const emptyBaseStyle = {
      version: 8,
      glyphs: "https://demotiles.maplibre.org/font/{fontstack}/{range}.pbf",
      sources: {},
      layers: []
    };

    const overlaySources = {
      parcels: {
        tiles: [
          "https://service.pdok.nl/kadaster/kadastralekaart/wms/v5_0?SERVICE=WMS&VERSION=1.1.1&REQUEST=GetMap&LAYERS=KadastraleGrens,Label&STYLES=&FORMAT=image/png&TRANSPARENT=true&SRS=EPSG:3857&BBOX={bbox-epsg-3857}&WIDTH=256&HEIGHT=256"
        ],
        opacity: 0.85
      },
      buildings: {
        tiles: [
          "https://service.pdok.nl/lv/bag/wms/v2_0?SERVICE=WMS&VERSION=1.1.1&REQUEST=GetMap&LAYERS=pand&STYLES=&FORMAT=image/png&TRANSPARENT=true&SRS=EPSG:3857&BBOX={bbox-epsg-3857}&WIDTH=256&HEIGHT=256"
        ],

      },

        ],

      ahn4Dtm: {
        tiles: [
          "https://service.pdok.nl/rws/ahn/wms/v1_0?SERVICE=WMS&VERSION=1.1.1&REQUEST=GetMap&LAYERS=dtm_05m&STYLES=&FORMAT=image/png&TRANSPARENT=true&SRS=EPSG:3857&BBOX={bbox-epsg-3857}&WIDTH=256&HEIGHT=256"
        ],
        opacity: 0.55
      },
      ahn4Dsm: {
        tiles: [
          "https://service.pdok.nl/rws/ahn/wms/v1_0?SERVICE=WMS&VERSION=1.1.1&REQUEST=GetMap&LAYERS=dsm_05m&STYLES=&FORMAT=image/png&TRANSPARENT=true&SRS=EPSG:3857&BBOX={bbox-epsg-3857}&WIDTH=256&HEIGHT=256"
        ],
        opacity: 0.45
      },
      broGeomorphology: {
        tiles: [
          "https://service.pdok.nl/bzk/bro-geomorfologischekaart/wms/v2_0?SERVICE=WMS&VERSION=1.1.1&REQUEST=GetMap&LAYERS=geomorphological_area,area_of_geomorphological_interest&STYLES=geomorphological_area,geomorphological_interest&FORMAT=image/png&TRANSPARENT=true&SRS=EPSG:3857&BBOX={bbox-epsg-3857}&WIDTH=256&HEIGHT=256"
        ],
        opacity: 0.74
      },
      broSoilMap: {
        tiles: [
          "https://service.pdok.nl/bzk/bro-bodemkaart/wms/v1_0?SERVICE=WMS&VERSION=1.1.1&REQUEST=GetMap&LAYERS=soilarea,areaofpedologicalinterest&STYLES=soilslope,pedologicalinterest&FORMAT=image/png&TRANSPARENT=true&SRS=EPSG:3857&BBOX={bbox-epsg-3857}&WIDTH=256&HEIGHT=256"
        ],
        opacity: 0.74
      },
      broGroundwaterGhg: {
        tiles: [
          "https://service.pdok.nl/bzk/bro-grondwaterspiegeldiepte/wms/v2_0?SERVICE=WMS&VERSION=1.1.1&REQUEST=GetMap&LAYERS=bro-grondwaterspiegeldieptemetingen-GHG&STYLES=&FORMAT=image/png&TRANSPARENT=true&SRS=EPSG:3857&BBOX={bbox-epsg-3857}&WIDTH=256&HEIGHT=256"
        ],
        opacity: 0.74
      },
      broGroundwaterGlg: {
        tiles: [
          "https://service.pdok.nl/bzk/bro-grondwaterspiegeldiepte/wms/v2_0?SERVICE=WMS&VERSION=1.1.1&REQUEST=GetMap&LAYERS=bro-grondwaterspiegeldieptemetingen-GLG&STYLES=&FORMAT=image/png&TRANSPARENT=true&SRS=EPSG:3857&BBOX={bbox-epsg-3857}&WIDTH=256&HEIGHT=256"
        ],
        opacity: 0.74
      },
      broGroundwaterGvg: {
        tiles: [
          "https://service.pdok.nl/bzk/bro-grondwaterspiegeldiepte/wms/v2_0?SERVICE=WMS&VERSION=1.1.1&REQUEST=GetMap&LAYERS=bro-grondwaterspiegeldieptemetingen-GVG&STYLES=&FORMAT=image/png&TRANSPARENT=true&SRS=EPSG:3857&BBOX={bbox-epsg-3857}&WIDTH=256&HEIGHT=256"
        ],
        opacity: 0.74
      },
      broGroundwaterGt: {
        tiles: [
          "https://service.pdok.nl/bzk/bro-grondwaterspiegeldiepte/wms/v2_0?SERVICE=WMS&VERSION=1.1.1&REQUEST=GetMap&LAYERS=bro-grondwaterspiegeldieptemetingen-GT&STYLES=&FORMAT=image/png&TRANSPARENT=true&SRS=EPSG:3857&BBOX={bbox-epsg-3857}&WIDTH=256&HEIGHT=256"
        ],
        opacity: 0.74
      },
      broGroundwaterDocumentation: {
        tiles: [
          "https://service.pdok.nl/bzk/bro-grondwaterspiegeldiepte/wms/v2_0?SERVICE=WMS&VERSION=1.1.1&REQUEST=GetMap&LAYERS=bro-grondwaterspiegeldiepte-modeldocumentatie&STYLES=&FORMAT=image/png&TRANSPARENT=true&SRS=EPSG:3857&BBOX={bbox-epsg-3857}&WIDTH=256&HEIGHT=256"
        ],
        opacity: 0.74
      }
    };

    const statusEl = document.getElementById("status");

    function updateWorkDrawingChrome() {
      document.body.classList.toggle("workdrawing-mode", workDrawingMode);
      const scaleText = document.getElementById("workDrawingScaleText");
      if (scaleText) scaleText.textContent = `1:${workDrawingScale}`;
      const scaleBarText = document.getElementById("workDrawingScaleBarText");
      if (scaleBarText) scaleBarText.textContent = workDrawingScale <= 200 ? "20 m" : workDrawingScale <= 500 ? "50 m" : "100 m";
      const dateText = document.getElementById("workDrawingDate");
      if (dateText && !dateText.textContent) dateText.textContent = new Date().toLocaleDateString("nl-NL");
    }
    function setStatus(text) {
      if (statusEl) statusEl.textContent = text;
    }

    function formatMeters(value) {
      const numeric = Number(value);
      if (!Number.isFinite(numeric)) return "0";
      return numeric.toLocaleString("nl-NL", { maximumFractionDigits: 1 });
    }

    function currentCamera() {
      return {
        center: map.getCenter().toArray(),
        zoom: map.getZoom(),
        bearing: 0,
        pitch: 0
      };
    }

    let mapStateChangedTimer = 0;
    function sendMapStateChanged(reason) {
      window.clearTimeout(mapStateChangedTimer);
      mapStateChangedTimer = window.setTimeout(() => {
        send({ type: "mapStateChanged", reason: reason || "map", camera: currentCamera() });
      }, 180);
    }

    function setMapLocked(locked) {
      mapLocked = !!locked;
      const action = mapLocked ? "disable" : "enable";
      for (const interaction of [map.dragPan, map.scrollZoom, map.boxZoom, map.keyboard, map.doubleClickZoom]) {
        if (interaction && typeof interaction[action] === "function") interaction[action]();
      }
      if (map.dragRotate && typeof map.dragRotate.disable === "function") map.dragRotate.disable();
      if (map.touchZoomRotate && typeof map.touchZoomRotate.disableRotation === "function") map.touchZoomRotate.disableRotation();
      if (mapLocked) {
        machinePlacementMode = false;
        traceLineDragStart = null;
        traceDragIndex = -1;
        if (activeFeaturePopup) activeFeaturePopup.remove();
      }
      map.getCanvas().style.cursor = mapLocked ? "not-allowed" : "";
      document.body.classList.toggle("map-locked", mapLocked);
      setStatus(mapLocked ? "Kaart vergrendeld - filters blijven actief" : "Kaart ontgrendeld");
    }

    function restoreCamera(camera) {
      if (!camera) return;
      const target = {};
      if (Array.isArray(camera.center) && camera.center.length >= 2) target.center = camera.center;
      if (Number.isFinite(Number(camera.zoom))) target.zoom = Number(camera.zoom);
      target.bearing = Number.isFinite(Number(camera.bearing)) ? Number(camera.bearing) : 0;
      target.pitch = Number.isFinite(Number(camera.pitch)) ? Number(camera.pitch) : 0;
      if (Object.keys(target).length) {
        map.jumpTo(target);
        setStatus("Opgeslagen kaartpositie hersteld");
      }
    }

    if (!window.maplibregl) {
      setStatus("MapLibre kon niet laden.");
      send({ type: "error", message: "MapLibre library ontbreekt" });
    }

    const map = new maplibregl.Map({
      container: "map",
      style: baseStyles["pdok-brt"],
      center,
      zoom: 13.8,
      bearing: 0,
      pitch: 0,
      dragRotate: false,
      pitchWithRotate: false,
      attributionControl: false
    });

    const mapDiagErrors = [];
    map.on("error", e => {
      try {
        const msg = (e && e.error && e.error.message) ? e.error.message : String(e && e.sourceId ? ("source:" + e.sourceId) : e);
        mapDiagErrors.push(msg);
        if (mapDiagErrors.length > 20) mapDiagErrors.shift();
      } catch (_) {}
    });
    window.addEventListener("error", ev => {
      try { mapDiagErrors.push("win:" + (ev.message || ev.type)); } catch (_) {}
    });

    map.addControl(new maplibregl.NavigationControl({ showCompass: false }), "top-left");
    map.addControl(new maplibregl.ScaleControl({ maxWidth: 130, unit: "metric" }), "bottom-left");
    if (map.dragRotate && typeof map.dragRotate.disable === "function") map.dragRotate.disable();
    if (map.touchZoomRotate && typeof map.touchZoomRotate.disableRotation === "function") map.touchZoomRotate.disableRotation();
    let viewportRenderFrame = 0;
    function scheduleViewportRender() {
      if (viewportRenderFrame) return;
      viewportRenderFrame = window.requestAnimationFrame(() => {
        viewportRenderFrame = 0;
        renderTraceDomLabels();
        renderTraceVectorOverlay();
        renderBoringInfoLeader();
        renderMachineDomSymbols();
        updateTraceWidthPaint();
      });
    }
    map.on("move", scheduleViewportRender);
    map.on("zoom", scheduleViewportRender);
    map.on("resize", scheduleViewportRender);
    map.on("moveend", () => {
      scheduleViewportRender();
      sendMapStateChanged("camera");
    });
    map.on("rotateend", () => sendMapStateChanged("camera"));
    map.on("pitchend", () => sendMapStateChanged("camera"));

    // WebView2 can drop the WebGL context when the map's host element is collapsed by
    // a tab switch. When that happens MapLibre stops painting and the empty container
    // background (#e8f3ee, light green) shows through. MapLibre v4 can restore the
    // context, but the restore/repaint frequently does not fire until the canvas is
    // nudged, so we track the state explicitly and force a repaint burst on restore.
    let webglContextLost = false;
    (function attachContextLossHandlers() {
      let mapCanvas = null;
      try { mapCanvas = map.getCanvas(); } catch (err) { mapCanvas = null; }
      if (!mapCanvas) return;
      mapCanvas.addEventListener("webglcontextlost", event => {
        // Essential: allow the browser to restore the context instead of losing it
        // permanently. Without preventDefault the map can never come back.
        event.preventDefault();
        webglContextLost = true;
        setStatus("Kaart-GPU verbroken - herstellen...");
      }, false);
      mapCanvas.addEventListener("webglcontextrestored", () => {
        webglContextLost = false;
        try { map.resize(); } catch (err) {}
        try { map.triggerRepaint(); } catch (err) {}
        forceMapRecover();
        setStatus("Kaart hersteld");
      }, false);
    })();

    // Repaint burst used both on GL-context restore and when the host asks the map to
    // recover after a tab switch. Repeated resize+repaint frames reclaim a stalled
    // WebView2 present surface and paint the restored GL context.
    let recoverInterval = 0;
    function forceMapRecover() {
      try { map.resize(); } catch (err) {}
      try { map.triggerRepaint(); } catch (err) {}
      renderTraceVectorOverlay();
      renderTraceDomLabels();
      if (recoverInterval) window.clearInterval(recoverInterval);
      let ticks = 0;
      recoverInterval = window.setInterval(() => {
        ticks++;
        try { map.resize(); } catch (err) {}
        try { map.triggerRepaint(); } catch (err) {}
        if (ticks >= 10) { window.clearInterval(recoverInterval); recoverInterval = 0; }
      }, 130);
    }

    map.on("load", () => {
      mapReady = true;
      setActiveMapTool(activeMapTool, true);
      setStatus("Ondergrond geladen");
      document.body.style.background = "#e8f3ee";
      map.resize();
      addOverlayLayers();
      addProjectLayers();
      addTraceLayers();
      addBroSoundingLayers();
      addMachineLayers();
      addMapToolLayers();
      addEnvironmentHighlightLayers();
      updateTraceLayer(true);
      updateBroSoundingLayers();
      updateMachineLayer();
      updateMapToolLayers();
      updateEnvironmentHighlight();
      send({ type: "ready" });
    });

    map.on("style.load", () => {
      if (mapReady) {
        map.resize();
        setActiveMapTool(activeMapTool, true);
        addOverlayLayers();
        addProjectLayers();
        addTraceLayers();
        addBroSoundingLayers();
        addMachineLayers();
        addMapToolLayers();
        addEnvironmentHighlightLayers();
        updateTraceLayer(true);
        updateBroSoundingLayers();
        updateMachineLayer();
        updateMapToolLayers();
        updateEnvironmentHighlight();
      }
    });

    map.on("error", event => {
      const message = event?.error?.message || "Onbekende kaartfout";
      setStatus(`Kaartfout: ${message}`);
      send({ type: "error", message });
    });

    window.addEventListener("resize", () => map.resize());
    setTimeout(() => map.resize(), 250);
    setTimeout(() => map.resize(), 1000);

    map.on("mousedown", event => {
      mapPointerDownPoint = event.point || null;
      mapPointerMoved = false;
    });

    map.on("mousemove", event => {
      if (!mapPointerDownPoint || mapPointerMoved || !event.point) return;
      const dx = event.point.x - mapPointerDownPoint.x;
      const dy = event.point.y - mapPointerDownPoint.y;
      mapPointerMoved = (dx * dx + dy * dy) > 36;
    });

    function finishMapPointerGesture() {
      if (mapPointerMoved) suppressFollowingMapClick(300);
      mapPointerDownPoint = null;
      mapPointerMoved = false;
    }

    map.on("mouseup", finishMapPointerGesture);
    map.getCanvas().addEventListener("mouseleave", finishMapPointerGesture);

    function suppressFollowingMapClick(timeoutMs = 450) {
      suppressNextMapClick = true;
      window.clearTimeout(suppressNextMapClickTimer);
      suppressNextMapClickTimer = window.setTimeout(() => {
        suppressNextMapClick = false;
      }, timeoutMs);
    }

    function consumeSuppressedMapClick() {
      if (!suppressNextMapClick) return false;
      suppressNextMapClick = false;
      window.clearTimeout(suppressNextMapClickTimer);
      suppressNextMapClickTimer = 0;
      return true;
    }

    function isDuplicatePrimaryMapClick(point) {
      if (!point || !lastPrimaryMapClick.point) return false;
      if (Date.now() - lastPrimaryMapClick.at > 140) return false;
      const dx = point.x - lastPrimaryMapClick.point.x;
      const dy = point.y - lastPrimaryMapClick.point.y;
      return (dx * dx + dy * dy) <= 16;
    }

    function rememberPrimaryMapClick(point) {
      lastPrimaryMapClick = {
        at: Date.now(),
        point: point ? { x: point.x, y: point.y } : null
      };
    }

    function handlePrimaryMapClick(lngLat, point) {
      if (mapLocked) return;
      if (isDuplicatePrimaryMapClick(point)) return;
      rememberPrimaryMapClick(point);
      if (consumeSuppressedMapClick()) return;
      const mapEvent = { lngLat, point };
      if (handleMapToolClick(mapEvent)) return;
      if (traceEnabled && traceDrawing) {
        addTracePoint(lngLat);
        return;
      }
      if (machinesEnabled && machinePlacementMode) {
        addMachineItem(lngLat);
        return;
      }
      if (machinesEnabled && !featureInfoMode) {
        const rd = wgs84ToRd(lngLat.lng, lngLat.lat);
        send({ type: "coord", lng: lngLat.lng.toFixed(6), lat: lngLat.lat.toFixed(6), rdX: rd.x, rdY: rd.y, epsg: "EPSG:28992" });
        return;
      }
      if (featureInfoMode) {
        const feature = pickProjectFeature(point);
        if (feature) {
          sendSelectedFeature(feature, lngLat);
          return;
        }
      }
      const rd = wgs84ToRd(lngLat.lng, lngLat.lat);
      send({ type: "coord", lng: lngLat.lng.toFixed(6), lat: lngLat.lat.toFixed(6), rdX: rd.x, rdY: rd.y, epsg: "EPSG:28992" });
    }

    map.on("click", event => {
      handlePrimaryMapClick(event.lngLat, event.point);
    });

    map.getCanvas().addEventListener("click", event => {
      if (event.button !== 0) return;
      const rect = map.getCanvas().getBoundingClientRect();
      const point = { x: event.clientX - rect.left, y: event.clientY - rect.top };
      const lngLat = map.unproject([point.x, point.y]);
      handlePrimaryMapClick(lngLat, point);
    });

    function initializeMapToolbar() {
      document.querySelectorAll(".map-tool-button[data-tool]").forEach(button => {
        button.addEventListener("click", () => { if (mapLocked) return; setActiveMapTool(button.dataset.tool || "select"); });
      });
      const clearDimensionsButton = document.getElementById("clearDimensionsButton");
      if (clearDimensionsButton) {
        clearDimensionsButton.addEventListener("click", () => {
          if (mapLocked) return;
          dimensionFeatures.splice(0, dimensionFeatures.length);
          dimensionLabelFeatures.splice(0, dimensionLabelFeatures.length);
          activeDimensionStart = null;
          updateMapToolLayers();
          setStatus("Maatvoering verwijderd");
        });
      }
      setActiveMapTool("select", true);
    }

    function setActiveMapTool(tool, silent) {
      activeMapTool = tool || "select";
      if (activeMapTool !== "line") activeSketchLineId = "";
      if (activeMapTool !== "dimension") activeDimensionStart = null;
      document.querySelectorAll(".map-tool-button[data-tool]").forEach(button => {
        button.classList.toggle("active", button.dataset.tool === activeMapTool);
      });
      if (mapReady) {
        map.getCanvas().style.cursor = mapLocked ? "not-allowed" : activeMapTool === "select" ? "grab" : activeMapTool === "delete" ? "not-allowed" : "crosshair";
      }
      if (!silent) {
        const labels = { select: "Handje actief", line: "Lijn tekenen actief", delete: "Verwijderen actief", dimension: "Maatvoering tekenen actief" };
        setStatus(labels[activeMapTool] || "Gereedschap actief");
      }
    }

    function isMapToolInteracting() {
      return activeMapTool !== "select";
    }

    function handleMapToolClick(event) {
      if (activeMapTool === "select") return false;
      if (activeMapTool === "line") {
        addSketchLinePoint(event.lngLat);
        return true;
      }
      if (activeMapTool === "dimension") {
        addDimensionPoint(event.lngLat);
        return true;
      }
      if (activeMapTool === "delete") {
        deleteToolFeature(event.point);
        return true;
      }
      return false;
    }

    function addSketchLinePoint(lngLat) {
      if (!activeSketchLineId) {
        activeSketchLineId = `sketch-${sketchLineId++}`;
        sketchLineFeatures.push({
          type: "Feature",
          id: activeSketchLineId,
          properties: { id: activeSketchLineId, type: "Schetslijn" },
          geometry: { type: "LineString", coordinates: [[lngLat.lng, lngLat.lat]] }
        });
      } else {
        const line = sketchLineFeatures.find(item => item.properties.id === activeSketchLineId);
        if (line) line.geometry.coordinates.push([lngLat.lng, lngLat.lat]);
      }
      updateMapToolLayers();
      const line = sketchLineFeatures.find(item => item.properties.id === activeSketchLineId);
      setStatus(`Lijn tekenen - ${line?.geometry?.coordinates?.length || 1} punt(en)`);
    }

    function addDimensionPoint(lngLat) {
      if (!activeDimensionStart) {
        activeDimensionStart = [lngLat.lng, lngLat.lat];
        setStatus("Maatvoering: kies eindpunt");
        return;
      }
      const end = [lngLat.lng, lngLat.lat];
      const id = `dimension-${dimensionId++}`;
      const meters = distanceMeters(activeDimensionStart, end);
      const mid = toolMidpoint(activeDimensionStart, end);
      dimensionFeatures.push({
        type: "Feature",
        id,
        properties: { id, type: "Maatvoering", meters: formatDistance(meters) },
        geometry: { type: "LineString", coordinates: [activeDimensionStart, end] }
      });
      dimensionLabelFeatures.push({
        type: "Feature",
        id: `${id}-label`,
        properties: { id, parentId: id, label: formatDistance(meters) },
        geometry: { type: "Point", coordinates: mid }
      });
      activeDimensionStart = null;
      updateMapToolLayers();
      setStatus(`Maatvoering toegevoegd: ${formatDistance(meters)}`);
    }

    function formatDistance(meters) {
      if (!Number.isFinite(meters)) return "0 m";
      return meters >= 100 ? `${Math.round(meters)} m` : `${meters.toFixed(1).replace(".", ",")} m`;
    }

    function toolMidpoint(a, b) {
      return [(a[0] + b[0]) / 2, (a[1] + b[1]) / 2];
    }

    function deleteToolFeature(point) {
      const layerIds = ["dimension-lines", "sketch-lines", "dimension-points", "sketch-points"];
      const activeLayers = layerIds.filter(id => map.getLayer(id));
      const features = activeLayers.length ? map.queryRenderedFeatures(point, { layers: activeLayers }) : [];
      const feature = features.find(item => item.properties?.id || item.properties?.parentId);
      if (feature) {
        const id = feature.properties.parentId || feature.properties.id;
        if (removeSketchLine(id) || removeDimension(id)) {
          updateMapToolLayers();
          setStatus("Object verwijderd");
          return;
        }
      }
      if (dimensionFeatures.length) {
        const last = dimensionFeatures[dimensionFeatures.length - 1].properties.id;
        removeDimension(last);
        updateMapToolLayers();
        setStatus("Laatste maatvoering verwijderd");
        return;
      }
      if (sketchLineFeatures.length) {
        const last = sketchLineFeatures[sketchLineFeatures.length - 1].properties.id;
        removeSketchLine(last);
        updateMapToolLayers();
        setStatus("Laatste lijn verwijderd");
      }
    }

    function removeSketchLine(id) {
      const index = sketchLineFeatures.findIndex(item => item.properties.id === id);
      if (index < 0) return false;
      sketchLineFeatures.splice(index, 1);
      if (activeSketchLineId === id) activeSketchLineId = "";
      return true;
    }

    function removeDimension(id) {
      const index = dimensionFeatures.findIndex(item => item.properties.id === id);
      if (index < 0) return false;
      dimensionFeatures.splice(index, 1);
      for (let i = dimensionLabelFeatures.length - 1; i >= 0; i--) {
        if (dimensionLabelFeatures[i].properties.parentId === id) dimensionLabelFeatures.splice(i, 1);
      }
      return true;
    }

    function addMapToolLayers() {
      if (!mapReady) return;
      ensureGeoJsonSource("sketch-lines-source");
      ensureGeoJsonSource("sketch-points-source");
      ensureGeoJsonSource("dimension-lines-source");
      ensureGeoJsonSource("dimension-points-source");
      ensureGeoJsonSource("dimension-labels-source");

      if (!map.getLayer("sketch-lines")) {
        map.addLayer({ id: "sketch-lines", type: "line", source: "sketch-lines-source", paint: { "line-color": "#111827", "line-width": 2.5 } });
      }
      if (!map.getLayer("sketch-points")) {
        map.addLayer({ id: "sketch-points", type: "circle", source: "sketch-points-source", paint: { "circle-radius": 4, "circle-color": "#ffffff", "circle-stroke-color": "#111827", "circle-stroke-width": 1.5 } });
      }
      if (!map.getLayer("dimension-lines")) {
        map.addLayer({ id: "dimension-lines", type: "line", source: "dimension-lines-source", paint: { "line-color": "#374151", "line-width": 2, "line-dasharray": [2, 2] } });
      }
      if (!map.getLayer("dimension-points")) {
        map.addLayer({ id: "dimension-points", type: "circle", source: "dimension-points-source", paint: { "circle-radius": 3.5, "circle-color": "#374151", "circle-stroke-color": "#ffffff", "circle-stroke-width": 1.3 } });
      }
      if (!map.getLayer("dimension-labels")) {
        map.addLayer({ id: "dimension-labels", type: "symbol", source: "dimension-labels-source", layout: { "text-field": ["get", "label"], "text-size": 12, "text-font": ["Open Sans Regular"], "text-offset": [0, -0.9], "text-anchor": "bottom" }, paint: { "text-color": "#111827", "text-halo-color": "#ffffff", "text-halo-width": 1.5 } });
      }
      bringMapToolLayersToFront();
    }

    function ensureGeoJsonSource(id) {
      if (!map.getSource(id)) map.addSource(id, { type: "geojson", data: emptyFeatureCollection() });
    }

    function updateMapToolLayers() {
      if (!mapReady) return;
      addMapToolLayers();
      setSourceData("sketch-lines-source", { type: "FeatureCollection", features: sketchLineFeatures });
      setSourceData("sketch-points-source", sketchPointFeatureCollection());
      setSourceData("dimension-lines-source", { type: "FeatureCollection", features: dimensionFeatures });
      setSourceData("dimension-points-source", dimensionPointFeatureCollection());
      setSourceData("dimension-labels-source", { type: "FeatureCollection", features: dimensionLabelFeatures });
      bringMapToolLayersToFront();
    }

    function setSourceData(sourceId, data) {
      const source = map.getSource(sourceId);
      if (source) source.setData(data || emptyFeatureCollection());
    }

    function emptyFeatureCollection() {
      return { type: "FeatureCollection", features: [] };
    }

    function sketchPointFeatureCollection() {
      const features = [];
      for (const line of sketchLineFeatures) {
        const id = line.properties.id;
        const coordinates = line.geometry.coordinates || [];
        coordinates.forEach((coordinate, index) => {
          features.push({ type: "Feature", properties: { id, pointIndex: index + 1 }, geometry: { type: "Point", coordinates: coordinate } });
        });
      }
      return { type: "FeatureCollection", features };
    }

    function dimensionPointFeatureCollection() {
      const features = [];
      for (const line of dimensionFeatures) {
        const id = line.properties.id;
        const coordinates = line.geometry.coordinates || [];
        coordinates.forEach((coordinate, index) => {
          features.push({ type: "Feature", properties: { id, pointIndex: index + 1 }, geometry: { type: "Point", coordinates: coordinate } });
        });
      }
      return { type: "FeatureCollection", features };
    }

    function bringMapToolLayersToFront() {
      ["sketch-lines", "sketch-points", "dimension-lines", "dimension-points", "dimension-labels"].forEach(layerId => {
        if (map.getLayer(layerId)) map.moveLayer(layerId);
      });
    }

    function addEnvironmentHighlightLayers() {
      if (!mapReady || !map.isStyleLoaded()) return;
      ensureGeoJsonSource("environment-highlight-source");
      if (!map.getLayer("environment-highlight-fill")) {
        map.addLayer({
          id: "environment-highlight-fill",
          type: "fill",
          source: "environment-highlight-source",
          filter: ["all", ["match", ["geometry-type"], ["Polygon", "MultiPolygon"], true, false], ["!=", ["get", "highlightKind"], "traceSegment"]],
          paint: {
            "fill-color": ["coalesce", ["get", "color"], "#F97316"],
            "fill-opacity": 0.16
          }
        });
      }
      if (!map.getLayer("environment-highlight-outline")) {
        map.addLayer({
          id: "environment-highlight-outline",
          type: "line",
          source: "environment-highlight-source",
          filter: ["all", ["match", ["geometry-type"], ["Polygon", "MultiPolygon"], true, false], ["!=", ["get", "highlightKind"], "traceSegment"]],
          paint: {
            "line-color": ["coalesce", ["get", "color"], "#F97316"],
            "line-width": 1.5,
            "line-opacity": 0.9
          },
          layout: { "line-cap": "butt", "line-join": "round" }
        });
      }
      if (!map.getLayer("environment-highlight-segment-halo")) {
        map.addLayer({
          id: "environment-highlight-segment-halo",
          type: "line",
          source: "environment-highlight-source",
          filter: ["==", ["get", "highlightKind"], "traceSegment"],
          paint: {
            "line-color": "#FFFFFF",
            "line-width": 13,
            "line-opacity": 0.85
          },
          layout: { "line-cap": "butt", "line-join": "round" }
        });
      }
      if (!map.getLayer("environment-highlight-segment")) {
        map.addLayer({
          id: "environment-highlight-segment",
          type: "line",
          source: "environment-highlight-source",
          filter: ["==", ["get", "highlightKind"], "traceSegment"],
          paint: {
            "line-color": ["coalesce", ["get", "color"], "#E11D48"],
            "line-width": 7,
            "line-opacity": 1
          },
          layout: { "line-cap": "butt", "line-join": "round" }
        });
      }
      if (!map.getLayer("environment-highlight-marker")) {
        map.addLayer({
          id: "environment-highlight-marker",
          type: "circle",
          source: "environment-highlight-source",
          filter: ["==", ["get", "highlightKind"], "segmentMarker"],
          paint: {
            "circle-radius": 8,
            "circle-color": ["coalesce", ["get", "color"], "#E11D48"],
            "circle-stroke-color": "#FFFFFF",
            "circle-stroke-width": 3
          }
        });
      }
      bringEnvironmentHighlightToFront();
    }

    function bringEnvironmentHighlightToFront() {
      ["environment-highlight-fill", "environment-highlight-outline", "environment-highlight-segment-halo", "environment-highlight-segment", "environment-highlight-marker"].forEach(layerId => {
        if (map.getLayer(layerId)) map.moveLayer(layerId);
      });
      bringTraceLayersToFront();
    }

    function updateEnvironmentHighlight() {
      if (!environmentHighlightData) return;
      addEnvironmentHighlightLayers();
      setSourceData("environment-highlight-source", environmentHighlightData);
      bringEnvironmentHighlightToFront();
    }

    function setEnvironmentHighlight(message) {
      environmentHighlightData = message.geojson || emptyFeatureCollection();
      updateEnvironmentHighlight();
      fitGeoJsonData(environmentHighlightData, true);
      setStatus(message.label ? `Perceel gemarkeerd: ${message.label}` : "Perceel gemarkeerd");
    }

    function fitGeoJsonData(data, preferTraceSegment = false) {
      const bounds = new maplibregl.LngLatBounds();
      let found = false;
      const features = data?.features || [];
      const focusFeatures = preferTraceSegment
        ? features.filter(feature => feature.properties?.highlightKind === "traceSegment" || feature.properties?.highlightKind === "segmentMarker")
        : features;
      for (const feature of focusFeatures.length ? focusFeatures : features) {
        visitCoordinates(feature.geometry?.coordinates, coordinate => {
          bounds.extend(coordinate);
          found = true;
        });
      }
      if (found) map.fitBounds(bounds, { padding: 110, maxZoom: 20, duration: 450 });
    }
    function rasterStyle(sourceId, tileUrl, attribution) {
      return {
        version: 8,
        glyphs: "https://demotiles.maplibre.org/font/{fontstack}/{range}.pbf",
        sources: {
          [sourceId]: {
            type: "raster",
            tiles: [tileUrl],
            tileSize: 256,
            attribution
          }
        },
        layers: [{ id: `${sourceId}-base`, type: "raster", source: sourceId }]
      };
    }

    function addOverlayLayers() {
      if (!map.isStyleLoaded()) return;

      for (const [id, config] of Object.entries(overlaySources)) {
        if (!map.getSource(id)) {
          map.addSource(id, { type: "raster", tiles: config.tiles, tileSize: 256 });
        }
        if (!map.getLayer(id)) {
          map.addLayer({
            id,
            type: "raster",
            source: id,
            paint: { "raster-opacity": config.opacity },
            layout: { visibility: overlays[id] ? "visible" : "none" }
          });
        }
      }
      syncOverlayVisibility();
    }

    function addProjectLayers() {
      if (!map.isStyleLoaded()) return;

      for (const layer of projectLayers) {
        const sourceId = `project-source-${layer.id}`;
        const fillLayerId = `project-fill-${layer.id}`;
        const lineLayerId = `project-line-${layer.id}`;
        const pointLayerId = `project-point-${layer.id}`;
        const hitLayerId = `project-hit-${layer.id}`;
        const specialCasingLayerId = `project-special-casing-${layer.id}`;
        const specialHatchLayerId = `project-special-hatch-${layer.id}`;
        const bufferOuterLayerId = `project-buffer-outer-${layer.id}`;
        const bufferInnerLayerId = `project-buffer-inner-${layer.id}`;

        const existingSource = map.getSource(sourceId);
        if (existingSource?.setData) {
          existingSource.setData(layer.featureCollection);
        } else if (!existingSource) {
          map.addSource(sourceId, { type: "geojson", data: layer.featureCollection });
        }
        if (!map.getLayer(fillLayerId)) {
          map.addLayer({
            id: fillLayerId,
            type: "fill",
            source: sourceId,
            filter: projectFilter(["Polygon", "MultiPolygon"], layer),
            paint: {
              "fill-color": ["coalesce", ["get", "color"], layer.color || "#64748B"],
              "fill-opacity": isBgtProjectLayer(layer) ? 0.46 : 0.08,
              "fill-outline-color": ["coalesce", ["get", "color"], layer.color || "#64748B"]
            }
          });
          registerProjectLayerClick(fillLayerId);
        }
        if (!map.getLayer(bufferOuterLayerId)) {
          map.addLayer({
            id: bufferOuterLayerId,
            type: "line",
            source: sourceId,
            filter: projectFilter(["LineString", "MultiLineString", "Polygon"], layer),
            paint: {
              "line-color": "#9CA3AF",
              "line-width": [
                "interpolate",
                ["linear"],
                ["zoom"],
                14, 5,
                15, 6,
                16, 8,
                17, 11,
                18, 16,
                19, 28,
                20, 46
              ],
              "line-opacity": 0.72,
              "line-blur": 0.8
            }
          });
          registerProjectLayerClick(bufferOuterLayerId);
        }
        if (!map.getLayer(bufferInnerLayerId)) {
          map.addLayer({
            id: bufferInnerLayerId,
            type: "line",
            source: sourceId,
            filter: projectFilter(["LineString", "MultiLineString", "Polygon"], layer),
            paint: {
              "line-color": "#FFFFFF",
              "line-width": [
                "interpolate",
                ["linear"],
                ["zoom"],
                14, 3,
                15, 4,
                16, 6,
                17, 9,
                18, 13,
                19, 24,
                20, 40
              ],
              "line-opacity": 0.68,
              "line-blur": 0.35
            }
          });
          registerProjectLayerClick(bufferInnerLayerId);
        }
        if (!map.getLayer(lineLayerId)) {
          map.addLayer({
            id: lineLayerId,
            type: "line",
            source: sourceId,
            filter: projectFilter(["LineString", "MultiLineString", "Polygon"], layer),
            paint: {
              "line-color": ["coalesce", ["get", "color"], layer.color || "#888888"],
              "line-width": isBgtProjectLayer(layer) ? 1.1 : 2,
              "line-opacity": isBgtProjectLayer(layer) ? 0.72 : 0.9
            }
          });
          registerProjectLayerClick(lineLayerId);
        }
        if (!map.getLayer(specialCasingLayerId)) {
          map.addLayer({
            id: specialCasingLayerId,
            type: "line",
            source: sourceId,
            filter: projectSpecialFilter(["LineString", "MultiLineString", "Polygon"], layer),
            paint: {
              "line-color": ["coalesce", ["get", "color"], layer.color || "#888888"],
              "line-width": 2,
              "line-opacity": 0.96
            }
          });
          registerProjectLayerClick(specialCasingLayerId);
        }
        if (!map.getLayer(specialHatchLayerId)) {
          map.addLayer({
            id: specialHatchLayerId,
            type: "line",
            source: sourceId,
            filter: projectSpecialFilter(["LineString", "MultiLineString", "Polygon"], layer),
            paint: {
              "line-color": "#FFFFFF",
              "line-width": 0,
              "line-opacity": 0
            }
          });
          registerProjectLayerClick(specialHatchLayerId);
        }
        if (!map.getLayer(hitLayerId)) {
          map.addLayer({
            id: hitLayerId,
            type: "line",
            source: sourceId,
            filter: projectFilter(["LineString", "MultiLineString", "Polygon"], layer),
            paint: {
              "line-color": "#000000",
              "line-width": 18,
              "line-opacity": 0.01
            }
          });
          registerProjectLayerClick(hitLayerId);
        }
        if (!map.getLayer(pointLayerId)) {
          map.addLayer({
            id: pointLayerId,
            type: "circle",
            source: sourceId,
            filter: projectFilter(["Point"], layer),
            paint: {
              "circle-radius": 5,
              "circle-color": ["coalesce", ["get", "color"], layer.color || "#888888"],
              "circle-stroke-color": "#ffffff",
              "circle-stroke-width": 1
            }
          });
          registerProjectLayerClick(pointLayerId);
        }
        applyProjectLayerFilters(fillLayerId, bufferOuterLayerId, bufferInnerLayerId, lineLayerId, specialCasingLayerId, specialHatchLayerId, pointLayerId, hitLayerId);
      }
      applyWorkDrawingPaint();
      updateMachineLayer();
      updateEnvironmentHighlight();
    }

    function projectLayerMapIds(layer) {
      return [
        `project-fill-${layer.id}`,
        `project-special-hatch-${layer.id}`,
        `project-special-casing-${layer.id}`,
        `project-hit-${layer.id}`,
        `project-point-${layer.id}`,
        `project-line-${layer.id}`,
        `project-buffer-inner-${layer.id}`,
        `project-buffer-outer-${layer.id}`
      ];
    }

    function removeProjectLayerFromMap(layer) {
      if (!layer || !layer.id || !map) return;
      for (const layerId of projectLayerMapIds(layer)) {
        if (map.getLayer(layerId)) map.removeLayer(layerId);
        registeredProjectClickLayers.delete(layerId);
      }
      const sourceId = `project-source-${layer.id}`;
      if (map.getSource(sourceId)) map.removeSource(sourceId);
    }

    function removeStaleProjectLayers(nextLayers) {
      const nextIds = new Set((Array.isArray(nextLayers) ? nextLayers : []).map(layer => String(layer.id || "")));
      for (const layer of projectLayers) {
        if (!nextIds.has(String(layer.id || ""))) {
          removeProjectLayerFromMap(layer);
        }
      }
    }

    function projectColorExpression(layer, fallback) {
      return ["coalesce", ["get", "color"], layer?.color || fallback];
    }

    function applyWorkDrawingPaint() {
      if (!map || !map.isStyleLoaded()) return;
      for (const layer of projectLayers) {
        const fillLayerId = `project-fill-${layer.id}`;
        const lineLayerId = `project-line-${layer.id}`;
        const pointLayerId = `project-point-${layer.id}`;
        const specialCasingLayerId = `project-special-casing-${layer.id}`;
        const isBgt = isBgtProjectLayer(layer);
        const isBag = isBagProjectLayer(layer);
        if (map.getLayer(fillLayerId)) {
          map.setPaintProperty(fillLayerId, "fill-color", workDrawingMode && isBgt ? "#FFFFFF" : workDrawingMode && isBag ? "#0B2F6B" : projectColorExpression(layer, "#64748B"));
          map.setPaintProperty(fillLayerId, "fill-opacity", workDrawingMode && isBgt ? 0.92 : workDrawingMode && isBag ? 0.08 : isBgt ? 0.46 : 0.08);
          map.setPaintProperty(fillLayerId, "fill-outline-color", workDrawingMode && isBag ? "#0B2F6B" : workDrawingMode && isBgt ? "#CBD5E1" : projectColorExpression(layer, "#64748B"));
        }
        if (map.getLayer(lineLayerId)) {
          map.setPaintProperty(lineLayerId, "line-color", workDrawingMode && isBag ? "#0B2F6B" : workDrawingMode && isBgt ? "#CBD5E1" : projectColorExpression(layer, "#888888"));
          map.setPaintProperty(lineLayerId, "line-width", workDrawingMode && isBag ? 2.2 : workDrawingMode && isBgt ? 1.1 : isBgt ? 1.1 : 2);
          map.setPaintProperty(lineLayerId, "line-opacity", workDrawingMode && (isBag || isBgt) ? 1 : isBgt ? 0.72 : 0.9);
        }
        if (map.getLayer(pointLayerId)) {
          map.setPaintProperty(pointLayerId, "circle-color", workDrawingMode && isBag ? "#0B2F6B" : workDrawingMode && isBgt ? "#FFFFFF" : projectColorExpression(layer, "#888888"));
          map.setPaintProperty(pointLayerId, "circle-stroke-color", workDrawingMode && isBag ? "#FFFFFF" : workDrawingMode && isBgt ? "#CBD5E1" : "#FFFFFF");
          map.setPaintProperty(pointLayerId, "circle-stroke-width", workDrawingMode && (isBag || isBgt) ? 1.5 : 1);
        }
        if (map.getLayer(specialCasingLayerId)) {
          map.setPaintProperty(specialCasingLayerId, "line-color", workDrawingMode && isBag ? "#0B2F6B" : projectColorExpression(layer, "#888888"));
          map.setPaintProperty(specialCasingLayerId, "line-opacity", workDrawingMode && isBag ? 1 : 0.96);
        }
      }
      updateTracePaint();
    }

    function updateTracePaint() {
      if (!map || !map.isStyleLoaded()) return;
      const captureMode = document.body.classList.contains("report-capture");
      if (map.getLayer("bore-trace-width")) {
        map.setPaintProperty("bore-trace-width", "line-color", captureMode ? "#FFFFFF" : "#E11D48");
        map.setPaintProperty("bore-trace-width", "line-width", captureMode ? 9 : traceBoringWidthPixels());
        map.setPaintProperty("bore-trace-width", "line-opacity", captureMode ? 0.92 : workDrawingMode ? 0.16 : 0.28);
      }
      if (map.getLayer("bore-trace-line")) {
        map.setPaintProperty("bore-trace-line", "line-color", "#E11D48");
        map.setPaintProperty("bore-trace-line", "line-width", captureMode ? 4.2 : workDrawingMode ? 3.4 : 2);
        map.setPaintProperty("bore-trace-line", "line-opacity", 1);
      }
      if (map.getLayer("bore-trace-points")) {
        map.setPaintProperty("bore-trace-points", "circle-stroke-color", "#E11D48");
        map.setPaintProperty("bore-trace-points", "circle-stroke-width", workDrawingMode ? 2.5 : 2);
      }
    }
    function isBgtProjectLayer(layer) {
      const type = String(layer?.type || "").toUpperCase();
      const name = String(layer?.name || "").toUpperCase();
      return type.includes("BGT") || name.includes("BGT");
    }

    function isBagProjectLayer(layer) {
      const type = String(layer?.type || "").toUpperCase();
      const name = String(layer?.name || "").toUpperCase();
      return type.includes("BAG") || name.includes("BAG") || name.includes("KADASTER");
    }

    function isKlicProjectLayer(layer) {
      return String(layer?.type || "").toUpperCase() === "KLIC";
    }

    function isDesignProjectLayer(layer) {
      return ["LS", "MS", "GAS", "WATER", "DATA", "ONTWERP"].includes(String(layer?.type || "").toUpperCase());
    }

    function isProjectLayerVisible(layer) {
      if (!layer || !layer.id) return true;
      if (workDrawingMode && !(isBgtProjectLayer(layer) || isBagProjectLayer(layer) || isKlicProjectLayer(layer))) return false;
      return projectLayerVisibility[layer.id] !== false;
    }

    function projectFilter(geometryTypes, layer) {
      return projectBaseFilter(geometryTypes, layer);
    }

    function projectSpecialFilter(geometryTypes, layer) {
      return ["all", projectBaseFilter(geometryTypes, layer), ["==", ["get", "specialObject"], true]];
    }

    function projectBaseFilter(geometryTypes, layer) {
      const geometryFilter = ["match", ["geometry-type"], geometryTypes, true, false];
      if (isBgtProjectLayer(layer)) {
        const hiddenSurfaces = Object.entries(bgtSurfaces)
          .filter(([, visible]) => visible === false)
          .map(([surface]) => surface);
        return hiddenSurfaces.length
          ? ["all", geometryFilter, ["!", ["in", ["coalesce", ["get", "surface"], "overig"], ["literal", hiddenSurfaces]]]]
          : geometryFilter;
      }
      if (!isKlicProjectLayer(layer)) return geometryFilter;
      const hiddenThemes = Object.entries(klicThemes)
        .filter(([, visible]) => visible === false)
        .map(([theme]) => theme);
      return hiddenThemes.length
        ? ["all", geometryFilter, ["!", ["in", ["get", "theme"], ["literal", hiddenThemes]]]]
        : geometryFilter;
    }
    function applyProjectLayerFilters(...layerIds) {
      for (const layerId of layerIds) {
        if (!map.getLayer(layerId)) continue;
        const layer = getProjectLayerMeta(layerId);
        const isBgt = isBgtProjectLayer(layer);
        const isBag = isBagProjectLayer(layer);
        const isKlic = isKlicProjectLayer(layer);
        const isDesign = isDesignProjectLayer(layer);
        const geometryTypes = layerId.includes("-point-")
          ? ["Point"]
          : layerId.includes("-fill-")
            ? ["Polygon", "MultiPolygon"]
            : ["LineString", "MultiLineString", "Polygon"];
        map.setFilter(layerId, projectFilter(geometryTypes, layer));
        const layerEnabled = isProjectLayerVisible(layer);
        const visible = layerEnabled && (isBgt
          ? overlays.bgt !== false && !layerId.includes("-buffer-") && !layerId.includes("-special-")
          : isBag
            ? overlays.bagImport !== false && !layerId.includes("-buffer-") && !layerId.includes("-special-")
            : isKlic
              ? layerId.includes("-fill-")
                ? false
                : layerId.includes("-buffer-")
                  ? overlays.klic !== false && overlays.klicBuffer !== false
                  : overlays.klic !== false
              : isDesign
                ? layerId.includes("-fill-")
                  ? false
                  : overlays.designImport !== false
                : layerId.includes("-fill-")
                  ? false
                  : overlays.customImport !== false);
        map.setLayoutProperty(layerId, "visibility", visible ? "visible" : "none");
      }
    }

    function applyAllProjectLayerFilters() {
      for (const layer of projectLayers) {
        applyProjectLayerFilters(`project-fill-${layer.id}`, `project-buffer-outer-${layer.id}`, `project-buffer-inner-${layer.id}`, `project-line-${layer.id}`, `project-special-casing-${layer.id}`, `project-special-hatch-${layer.id}`, `project-point-${layer.id}`, `project-hit-${layer.id}`);
      }
    }

    function projectInteractiveLayerIds() {
      const ids = [];
      for (const layer of projectLayers) {
        ids.push(`project-fill-${layer.id}`, `project-special-hatch-${layer.id}`, `project-special-casing-${layer.id}`, `project-hit-${layer.id}`, `project-point-${layer.id}`, `project-line-${layer.id}`, `project-buffer-inner-${layer.id}`, `project-buffer-outer-${layer.id}`);
      }
      return ids.filter(id => map.getLayer(id));
    }

    function pickProjectFeature(point) {
      const layerIds = projectInteractiveLayerIds();
      if (!layerIds.length) return null;
      const features = map.queryRenderedFeatures(point, { layers: layerIds });
      return features && features.length ? features[0] : null;
    }

    function getProjectLayerMeta(layerId) {
      return projectLayers.find(layer =>
        layerId === `project-fill-${layer.id}` ||
        layerId === `project-line-${layer.id}` ||
        layerId === `project-point-${layer.id}` ||
        layerId === `project-hit-${layer.id}` ||
        layerId === `project-special-casing-${layer.id}` ||
        layerId === `project-special-hatch-${layer.id}` ||
        layerId === `project-buffer-inner-${layer.id}` ||
        layerId === `project-buffer-outer-${layer.id}`
      );
    }

    function escapeHtml(value) {
      return String(value ?? "-")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function themeLabel(theme) {
      const labels = {
        laagspanning: "KLIC laagspanning",
        middenspanning: "KLIC middenspanning",
        hoogspanning: "KLIC hoogspanning",
        gasLageDruk: "KLIC gas lage druk",
        gasHogeDruk: "KLIC gas hoge druk",
        water: "KLIC water",
        datatransport: "KLIC data/telecom",
        rioolVrijverval: "KLIC riool vrijverval",
        rioolOnderOverOfOnderdruk: "KLIC riool druk",
        warmte: "KLIC warmte",
        overig: "KLIC overig"
      };
      return labels[theme] || (theme ? `KLIC ${theme}` : "-");
    }

    function featureThemeLabel(properties, meta) {
      if (String(properties.source || meta?.type || "").toUpperCase() === "BGT") {
        return properties.theme || properties.objectType || "BGT";
      }

      return themeLabel(properties.theme);
    }

    function popupRow(label, value) {
      return `<div class="klic-popup-row"><span class="klic-popup-label">${escapeHtml(label)}</span><span>${escapeHtml(value || "-")}</span></div>`;
    }

    function propertyLabel(key) {
      return String(key)
        .replace(/^utility\./, "")
        .replace(/^network\./, "netwerk.")
        .replaceAll(".", " ");
    }

    function extraPropertyRows(properties) {
      const hidden = new Set(["source", "theme", "color", "detailId", "utilityLinkId", "networkId", "objectType", "objectId"]);
      const keys = Object.keys(properties)
        .filter(key => !hidden.has(key) && properties[key] !== null && properties[key] !== undefined && String(properties[key]).trim() !== "")
        .sort((a, b) => propertyLabel(a).localeCompare(propertyLabel(b), "nl"))
        .slice(0, 24);
      const rows = keys
        .map(key => popupRow(propertyLabel(key), properties[key]))
        .join("");
      const total = Object.keys(properties).filter(key => !hidden.has(key)).length;
      return total > keys.length
        ? `${rows}${popupRow("Meer velden", `${total - keys.length} extra velden niet getoond voor snelheid`)}`
        : rows;
    }

    function documentRows(documents) {
      if (!documents || !documents.length) return "";
      const buttons = documents
        .map(doc => `<button class="klic-popup-doc" type="button" onclick="window.borevexaOpenDocument('${escapeHtml(doc.id)}')">${escapeHtml(doc.name)} Â· ${escapeHtml(doc.type)} Â· ${escapeHtml(doc.sizeKb)} KB</button>`)
        .join("");
      return `<div class="klic-popup-docs"><div class="klic-popup-docs-title">Bijlagen</div>${buttons}</div>`;
    }

    function featureTitle(properties) {
      const type = properties.objectType || properties["object.objectType"] || "object";
      if (String(properties.source || "").toUpperCase() === "BGT") return `BGT ${type}`;
      if (String(type).toLowerCase() === "leiding") return "KLIC leiding";
      return `KLIC ${type}`;
    }

    function featurePopupHtml(feature, meta, extraProperties, documents) {
      const properties = feature.properties || {};
      const detailProperties = extraProperties || properties;
      return `
        <div class="klic-popup">
          <strong>${escapeHtml(featureTitle(detailProperties))}</strong>
          ${popupRow("Laag", meta?.name || "-")}
          ${popupRow("Type", meta?.type || "-")}
          ${popupRow("Object", detailProperties.objectType || properties.objectType || "-")}
          ${popupRow("Thema", featureThemeLabel(properties, meta))}
          ${popupRow("Bron", properties.source)}
          ${popupRow("UtilityLink", properties.utilityLinkId)}
          ${popupRow("Netwerk", properties.networkId)}
          ${extraProperties ? extraPropertyRows(detailProperties) : popupRow("Details", "Laden...")}
          ${documentRows(documents)}
        </div>`;
    }

    function showFeaturePopup(feature, meta, lngLat) {
      activeFeaturePopup = new maplibregl.Popup({ closeButton: true, closeOnClick: true, maxWidth: "360px" })
        .setLngLat(lngLat || map.getCenter())
        .setHTML(featurePopupHtml(feature, meta, null, []))
        .addTo(map);
    }

    function sendSelectedFeature(feature, lngLat) {
      const layerId = feature?.layer?.id || "";
      const meta = getProjectLayerMeta(layerId);
      activeFeatureDetailId = String(feature?.properties?.detailId || "");
      activeFeature = feature;
      activeFeatureMeta = meta;
      showFeaturePopup(feature, meta, lngLat);
      if (activeFeatureDetailId) {
        send({ type: "featureDetailRequest", detailId: activeFeatureDetailId });
      }
      send({
        type: "feature",
        layerId,
        layerName: meta?.name || "",
        layerType: meta?.type || "",
        geometryType: feature.geometry && feature.geometry.type,
        properties: feature.properties || {}
      });
    }

    function applyFeatureDetail(message) {
      if (!activeFeaturePopup || !message || message.detailId !== activeFeatureDetailId) return;
      const properties = message.properties || {};
      activeFeaturePopup.setHTML(featurePopupHtml(activeFeature, activeFeatureMeta, properties, message.documents || []));
    }

    function registerProjectLayerClick(layerId) {
      if (registeredProjectClickLayers.has(layerId)) return;
      registeredProjectClickLayers.add(layerId);

      map.on("click", layerId, event => {
        if (mapLocked) return;
        if (machinePlacementMode) {
          suppressFollowingMapClick();
          addMachineItem(event.lngLat);
          return;
        }
        if (isMapToolInteracting() || (machinesEnabled && !featureInfoMode) || !featureInfoMode) return;
        const feature = event.features && event.features[0];
        if (!feature) return;
        const meta = getProjectLayerMeta(layerId);
        const layerType = String(meta?.type || feature.properties?.source || "").toUpperCase();
        const geometryType = String(feature.geometry?.type || "");
        if (layerType !== "KLIC" && layerType !== "BGT") return;
        if (layerType === "KLIC" && !geometryType.includes("LineString")) return;
        sendSelectedFeature(feature, event.lngLat);
      });
      map.on("mouseenter", layerId, () => { if (!isMapToolInteracting()) map.getCanvas().style.cursor = "pointer"; });
      map.on("mouseleave", layerId, () => { if (!isMapToolInteracting()) map.getCanvas().style.cursor = activeMapTool === "select" ? "grab" : ""; });
    }

    function setProjectLayers(layers) {
      removeStaleProjectLayers(layers);
      projectLayers = Array.isArray(layers) ? layers : [];
      addProjectLayers();
      if (!projectLayersFitted) {
        fitProjectLayers();
        projectLayersFitted = true;
      }
    }

    function fitProjectLayers() {
      const bounds = new maplibregl.LngLatBounds();
      let found = false;
      for (const layer of projectLayers) {
        for (const feature of layer.featureCollection.features || []) {
          visitCoordinates(feature.geometry.coordinates, coordinate => {
            bounds.extend(coordinate);
            found = true;
          });
        }
      }
      if (found) map.fitBounds(bounds, { padding: 80, maxZoom: 17, duration: 500 });
    }

    function visitCoordinates(coordinates, callback) {
      if (!Array.isArray(coordinates)) return;
      if (typeof coordinates[0] === "number" && typeof coordinates[1] === "number") {
        callback(coordinates);
        return;
      }
      for (const child of coordinates) visitCoordinates(child, callback);
    }

    function broSoundingFeatureCollection() {
      return {
        type: "FeatureCollection",
        features: (broSoundingsVisible ? broSoundings : [])
          .filter(item => Number.isFinite(Number(item.lon)) && Number.isFinite(Number(item.lat)))
          .map(item => {
            const id = String(item.id || "");
            const code = String(item.code || item.name || id || "BRO");
            const modelName = String(item.modelName || item.modelType || "");
            const source = String(item.source || "");
            const profileCount = Array.isArray(item.profileIntervals) ? item.profileIntervals.length : Number(item.profileCount || 0);
            const selected = id === selectedBroSoundingId || selectedBroSoundingIds.includes(id);
            const labelVisible = selected || profileCount > 0 || source.toLowerCase().includes("pdf") || item.labelVisible === true || item.reportLabel === true;
            const modelLabel = modelName
              .replace(/^BRO\s+/i, "")
              .replace(/\s+v[0-9.]+$/i, "")
              .trim();
            return {
              type: "Feature",
              geometry: { type: "Point", coordinates: [Number(item.lon), Number(item.lat)] },
              properties: {
                id,
                code,
                name: String(item.name || ""),
                distance: Number(item.distance || 0),
                offset: Number(item.offset || 0),
                surfaceNap: item.surfaceNap,
                endDepth: item.endDepth,
                soilSummary: String(item.soilSummary || ""),
                source,
                modelType: String(item.modelType || ""),
                modelName,
                label: labelVisible ? `${code}\n${modelLabel || "BRO bronlocatie"}` : "",
                profileSummary: String(item.profileSummary || ""),
                profileCount,
                selected
              }
            };
          })
      };
    }

    function setBroSoundings(message) {

    function fitBroSoundings() {
      const bounds = new maplibregl.LngLatBounds();
      let found = false;
      for (const item of broSoundings) {
        if (Number.isFinite(Number(item.lon)) && Number.isFinite(Number(item.lat))) {
          bounds.extend([Number(item.lon), Number(item.lat)]);
          found = true;
        }
      }
      if (traceCoordinates.length >= 2) {
        for (const coordinate of traceCoordinates) {

          found = true;
        }

      if (found) map.fitBounds(bounds, { padding: 90, maxZoom: 18, duration: 500 });

    function traceBoringWidthPixels() {
      const diameterMeters = Math.max(0.075, Number(traceBoringDiameterMm || 75) / 1000);
      const center = traceCenter() || map.getCenter().toArray();
      const shifted = [center[0], center[1] + diameterMeters / 111320];
      const a = map.project(center);
      const b = map.project(shifted);
      const pixels = Math.hypot(b.x - a.x, b.y - a.y);
      return Math.max(2, pixels);
    }

    function renderMachineDomSymbols() {
      const container = document.getElementById("machineSymbols");
      if (!container) return;
      if (!machinesEnabled || !mapReady || machineItems.length === 0) {
        container.innerHTML = "";
        return;
      }

      const width = Math.max(1, map.getContainer().clientWidth);
      const height = Math.max(1, map.getContainer().clientHeight);
      const polygons = [];
      const labels = [];

      for (const item of machineItems) {
        const machine = machineRectangleCoordinates(item);
        const rod = machineRodCoordinates(item);
        if (machine) polygons.push({ points: machine, selected: item.id === selectedMachineId });
        if (rod) polygons.push({ points: rod, selected: item.id === selectedMachineId });
        if (machine) labels.push({ text: item.label || "Boormachine", coordinate: polygonCenter(machine) });
        if (rod) labels.push({ text: "Boorgat", coordinate: polygonCenter(rod) });
      }

      const polygonMarkup = polygons
        .map(poly => {
          const points = poly.points
            .map(coordinate => {
              const point = map.project(coordinate);
              return `${round(point.x)},${round(point.y)}`;
            })
            .join(" ");
          const strokeWidth = poly.selected ? 4 : 3;
          return `<polygon points="${points}" style="stroke-width:${strokeWidth}"/>`;
        })
        .join("");
      const labelMarkup = labels
        .map(label => {
          const point = map.project(label.coordinate);
          return `<text x="${round(point.x)}" y="${round(point.y - 8)}" text-anchor="middle">${escapeHtml(label.text)}</text>`;
        })
        .join("");

      container.innerHTML = `<svg viewBox="0 0 ${width} ${height}" preserveAspectRatio="none">${polygonMarkup}${labelMarkup}</svg>`;
    }

    function polygonCenter(points) {
      const usable = (points || []).slice(0, -1);
      if (!usable.length) return [0, 0];
      const sum = usable.reduce((acc, coordinate) => [acc[0] + Number(coordinate[0] || 0), acc[1] + Number(coordinate[1] || 0)], [0, 0]);
      return [sum[0] / usable.length, sum[1] / usable.length];
    }

    function round(value) {
      return Math.round(Number(value || 0) * 10) / 10;
    }

    function machineFeatureCollection() {
      return {
        type: "FeatureCollection",

            label: item.label,
            labelText: `${item.label || "Machine"}\n${formatMeters(item.length)} x ${formatMeters(item.width)}`,
            length: item.length,
            width: item.width,
            selected: item.id === selectedMachineId
          },
          geometry: {
            type: "Polygon",
            coordinates: [machineRectangleCoordinates(item)]
          }
        }))
      };
    }

    function machineCenterFeatureCollection() {
      return { type: "FeatureCollection", features: [] };
    }

    function machineAnchorFeatureCollection() {
      return {
        type: "FeatureCollection",
        features: machineItems.map(item => ({
          type: "Feature",

            type: item.type,
