    function machineRotateFeatureCollection() {
      return {
        type: "FeatureCollection",
        features: machineItems.map(item => ({
          type: "Feature",
          properties: {
            id: item.id,
            type: item.type,
            selected: item.id === selectedMachineId
          },
          geometry: {
            type: "Point",
            coordinates: machineLocalToLngLat(item, -machineLength(item), 0)
          }
        }))
      };
    }

    function machineRodFeatureCollection() {
      return {
        type: "FeatureCollection",
        features: machineItems
          .filter(item => item.type === "rig" && machineBoreLength(item) > 0 && machineBoreWidth(item) > 0)
          .map(item => ({
            type: "Feature",
            properties: {
              id: item.id,
              type: item.type,
              labelText: `Boorgat\n${formatMeters(machineBoreLength(item))} x ${formatMeters(machineBoreWidth(item))}`,
              selected: item.id === selectedMachineId
            },
            geometry: {
              type: "Polygon",
              coordinates: [machineRodCoordinates(item)]
            }
          }))
      };
    }

    function machineLength(item) {
      return Number(item.length) || 5.42;
    }

    function machineWidth(item) {
      return Number(item.width) || 2.9;
    }

    function machineBoreLength(item) {
      if (item.type !== "rig") return 0;
      return Number(item.boreLength) || 3;
    }

    function machineBoreWidth(item) {
      if (item.type !== "rig") return 0;
      return Number(item.boreWidth) || 1;
    }

    function machineAnchorCoordinate(item) {
      return Array.isArray(item.anchor) ? item.anchor : Array.isArray(item.center) ? item.center : [0, 0];
    }

    function setMachineAnchorCoordinate(item, lngLat) {
      item.anchor = [lngLat.lng, lngLat.lat];
      item.center = item.anchor;
    }

    function machineRodCoordinates(item) {
      const length = machineBoreLength(item);
      const rodHalfWidth = machineBoreWidth(item) / 2;
      if (length <= 0 || rodHalfWidth <= 0) return null;
      const corners = [
        [0, -rodHalfWidth],
        [length, -rodHalfWidth],
        [length, rodHalfWidth],
        [0, rodHalfWidth],
        [0, -rodHalfWidth]
      ];
      return corners.map(([x, y]) => machineLocalToLngLat(item, x, y));
    }

    function machineSymbolFeatureCollection() {
      return { type: "FeatureCollection", features: [] };
    }

    function machineSymbolPoint(item, x, y) {
      if (!machineTopSymbol || !Array.isArray(item.center)) return null;
      const width = Number(machineTopSymbol.width) || 1;
      const height = Number(machineTopSymbol.height) || 1;
      const minX = Number(machineTopSymbol.minX) || 0;
      const minY = Number(machineTopSymbol.minY) || 0;
      const scaleX = (Number(item.length) || 4) / width;
      const scaleY = (Number(item.width) || 3) / height;
      const localX = (Number(x) - minX - width / 2) * scaleX;
      const localY = (Number(y) - minY - height / 2) * scaleY;
      const angle = Number.isFinite(item.rotation) ? item.rotation * Math.PI / 180 : 0;
      const east = localX * Math.cos(angle) - localY * Math.sin(angle);
      const north = localX * Math.sin(angle) + localY * Math.cos(angle);
      return offsetLngLat(item.center, east, north);
    }

    function machineLocalToLngLat(item, localX, localY) {
      const angle = Number.isFinite(item.rotation) ? item.rotation * Math.PI / 180 : 0;
      const east = localX * Math.cos(angle) - localY * Math.sin(angle);
      const north = localX * Math.sin(angle) + localY * Math.cos(angle);
      return offsetLngLat(machineAnchorCoordinate(item), east, north);
    }

    function machineRectangleCoordinates(item) {
      const length = machineLength(item);
      const halfWidth = machineWidth(item) / 2;
      const corners = [
        [-length, -halfWidth],
        [0, -halfWidth],
        [0, halfWidth],
        [-length, halfWidth],
        [-length, -halfWidth]
      ];
      return corners.map(([x, y]) => machineLocalToLngLat(item, x, y));
    }

    function offsetLngLat(center, eastMeters, northMeters) {
      const latRad = center[1] * Math.PI / 180;
      const lng = center[0] + eastMeters / (111320 * Math.max(0.2, Math.cos(latRad)));
      const lat = center[1] + northMeters / 111320;
      return [lng, lat];
    }

    function mapEastAngleBetween(a, b) {
      const pa = map.project(a);
      const pb = map.project(b);
      return ((Math.atan2(-(pb.y - pa.y), pb.x - pa.x) * 180 / Math.PI) + 360) % 360;
    }

    function traceRotationBetween(a, b) {
      const bearing = bearingBetween(a, b);
      return (90 - bearing + 360) % 360;
    }

    function addMachineItem(lngLat) {
      const id = `machine-${Date.now()}-${Math.round(Math.random() * 10000)}`;
      const item = {
        id,
        type: machinePlacementType,
        label: machinePlacementLabel,
        anchor: [lngLat.lng, lngLat.lat],
        center: [lngLat.lng, lngLat.lat],
        length: Number(machineLengthMeters) || 5.42,
        width: Number(machineWidthMeters) || 2.9,
        boreLength: Number(borePitLengthMeters) || 3,
        boreWidth: Number(borePitWidthMeters) || 1,
        rotation: traceCoordinates.length >= 2 ? traceRotationBetween(traceCoordinates[0], traceCoordinates[traceCoordinates.length - 1]) : 0
      };
      machineItems = machineItems.filter(existing => existing.type !== item.type);
      machineItems.push(item);
      selectedMachineId = id;
      updateMachineLayer();
      sendMachineChanged();
      setStatus(`${item.label} geplaatst`);
    }

    function registerMachineInteractions() {
      if (map.__machineInteractionsRegistered) return;
      map.__machineInteractionsRegistered = true;
      const beginMachineMove = event => {
        if (mapLocked || !event.features?.length) return;
        event.preventDefault();
        suppressFollowingMapClick();
        const id = event.features[0].properties?.id || "";
        const item = machineItems.find(candidate => candidate.id === id);
        if (!item) return;
        selectedMachineId = id;
        machineDrag = machineRotationModeType && item.type === machineRotationModeType
          ? { id, mode: "rotate" }
          : { id, mode: "move" };
        map.dragPan.disable();
        updateMachineLayer();
        setStatus(machineDrag.mode === "rotate"
          ? `${item.label || "Machine"} vrij roteren rond het aansluitpunt`
          : "Machine slepen: zet het aansluitpunt op de juiste plek");
      };
      map.on("mousedown", "machine-areas-fill", beginMachineMove);
      map.on("mousedown", "machine-rods-fill", beginMachineMove);
      map.on("mousedown", "machine-anchors-circle", event => {
        if (mapLocked || !event.features?.length) return;
        event.preventDefault();
        suppressFollowingMapClick();
        const id = event.features[0].properties?.id || "";
        selectedMachineId = id;
        machineDrag = { id, mode: "move" };
        map.dragPan.disable();
        updateMachineLayer();
        setStatus("Boormachine slepen: zet het aansluitpunt op de intrede");
      });
      map.on("mousedown", "machine-rotate-circle", event => {
        if (mapLocked || !event.features?.length) return;
        event.preventDefault();
        suppressFollowingMapClick();
        const id = event.features[0].properties?.id || "";
        selectedMachineId = id;
        machineDrag = { id, mode: "rotate" };
        map.dragPan.disable();
        updateMachineLayer();
        setStatus("Boormachine draaien rond het aansluitpunt");
      });
      map.on("mousemove", event => {
        if (!machineDrag) return;
        const item = machineItems.find(candidate => candidate.id === machineDrag.id);
        if (!item) return;
        if (machineDrag.mode === "rotate") {
          item.rotation = (traceRotationBetween(machineAnchorCoordinate(item), [event.lngLat.lng, event.lngLat.lat]) + 180) % 360;
        } else {
          setMachineAnchorCoordinate(item, event.lngLat);
        }
        updateMachineLayer();
      });
      map.on("mouseup", () => finishMachineDrag());
      map.on("mouseleave", () => finishMachineDrag());
      map.on("click", "machine-areas-fill", event => {
        if (mapLocked) return;
        if (!event.features?.length) return;
        suppressFollowingMapClick();
        const properties = event.features[0].properties || {};
        selectedMachineId = properties.id || "";
        updateMachineLayer();
        const item = machineItems.find(candidate => candidate.id === selectedMachineId);
        if (!item) return;
        new maplibregl.Popup({ closeButton: true })
          .setLngLat(event.lngLat)
          .setHTML(`<strong>${escapeHtml(item.label)}</strong><br>${formatMeters(item.length)} x ${formatMeters(item.width)} m`)
          .addTo(map);
      });
      map.on("mouseenter", "machine-areas-fill", () => { if (machinesEnabled) map.getCanvas().style.cursor = "grab"; });
      map.on("mouseleave", "machine-areas-fill", () => { if (!machineDrag) map.getCanvas().style.cursor = ""; });
      map.on("mouseenter", "machine-rods-fill", () => { if (machinesEnabled) map.getCanvas().style.cursor = "grab"; });
      map.on("mouseleave", "machine-rods-fill", () => { if (!machineDrag) map.getCanvas().style.cursor = ""; });
      map.on("mouseenter", "machine-anchors-circle", () => { if (machinesEnabled) map.getCanvas().style.cursor = "grab"; });
      map.on("mouseleave", "machine-anchors-circle", () => { if (!machineDrag) map.getCanvas().style.cursor = ""; });
      map.on("mouseenter", "machine-rotate-circle", () => { if (machinesEnabled) map.getCanvas().style.cursor = "ew-resize"; });
      map.on("mouseleave", "machine-rotate-circle", () => { if (!machineDrag) map.getCanvas().style.cursor = ""; });
    }

    function finishMachineDrag() {
      if (!machineDrag) return;
      machineDrag = null;
      machineRotationModeType = "";
      if (!map.dragPan.isEnabled()) map.dragPan.enable();
      map.getCanvas().style.cursor = "";
      updateMachineLayer();
      sendMachineChanged();
      setStatus("Boormachine bijgewerkt");
    }

    function sendMachineChanged() {
      send({ type: "machineChanged", items: machineItems });
    }

    function setMachineState(message) {
      machinesEnabled = !!message.enabled;
      if (message.symbol && Array.isArray(message.symbol.lines)) machineTopSymbol = message.symbol;
      if (Array.isArray(message.items)) {
        machineItems = uniqueMachineItems(message.items
          .filter(item => item && (Array.isArray(item.anchor) || Array.isArray(item.center)))
          .map(item => ({
            id: item.id || `machine-${Date.now()}-${Math.round(Math.random() * 10000)}`,
            type: item.type || "rig",
            label: item.label || "Machine",
            anchor: Array.isArray(item.anchor) ? item.anchor : item.center,
            center: Array.isArray(item.anchor) ? item.anchor : item.center,
            length: Number(item.length) || 5.42,
            width: Number(item.width) || 2.9,
            boreLength: Number(item.boreLength) || 3,
            boreWidth: Number(item.boreWidth) || 1,
            rotation: Number(item.rotation) || 0
          })));
      }
      addMachineLayers();
      updateMachineLayer();
    }

    function uniqueMachineItems(items) {
      const byType = new Map();
      for (const item of items || []) byType.set(item.type || "rig", item);
      return Array.from(byType.values()).filter(item => item.type === "rig" || item.type === "bentonite");
    }

    function startMachinePlacement(message) {
      machinesEnabled = true;
      featureInfoMode = false;
      machinePlacementMode = true;
      if (activeFeaturePopup) activeFeaturePopup.remove();
      machinePlacementType = message.machineType || "rig";
      machinePlacementLabel = message.label || "Machine";
      machineLengthMeters = Number(message.length) || 5.42;
      machineWidthMeters = Number(message.width) || 2.9;
      borePitLengthMeters = Number(message.boreLength) || 3;
      borePitWidthMeters = Number(message.boreWidth) || 1;
      setStatus(`${machinePlacementLabel} plaatsen: klik met het aansluitpunt op de intrede`);
      updateMachineLayer();
    }

    function targetMachine(preferredType) {
      const selected = machineItems.find(candidate => candidate.id === selectedMachineId);
      if (selected && (!preferredType || selected.type === preferredType)) return selected;
      if (preferredType) {
        const typed = machineItems.find(candidate => candidate.type === preferredType);
        if (typed) {
          selectedMachineId = typed.id;
          return typed;
        }
      }
      const fallback = machineItems[machineItems.length - 1] || null;
      if (fallback) selectedMachineId = fallback.id;
      return fallback;
    }

    function updateSelectedMachineSize(message) {
      const item = targetMachine(message.machineType || "");
      if (!item) {
        setStatus("Plaats of selecteer eerst een machinevlak op de kaart");
        return;
      }
      item.length = Number(message.length) || item.length;
      item.width = Number(message.width) || item.width;
      if (item.type === "rig") {
        item.boreLength = Number(message.boreLength) || item.boreLength || 3;
        item.boreWidth = Number(message.boreWidth) || item.boreWidth || 1;
      }
      updateMachineLayer();
      sendMachineChanged();
      setStatus(`${item.label || "Machine"} maat bijgewerkt`);
    }

    function alignMachineToTrace(message) {
      const item = targetMachine(message.machineType || "rig");
      if (!item) {
        setStatus("Plaats eerst een boormachine");
        return;
      }
      if (traceCoordinates.length < 2) {
        setStatus("Geen boorlijn beschikbaar om op uit te lijnen");
        return;
      }
      item.rotation = traceRotationBetween(traceCoordinates[0], traceCoordinates[traceCoordinates.length - 1]);
      updateMachineLayer();
      sendMachineChanged();
      setStatus(`${item.label || "Machine"} uitgelijnd op de boorlijn`);
    }

    function snapMachineToTraceStart(message) {
      const item = targetMachine(message.machineType || "rig");
      if (!item) {
        setStatus("Plaats eerst een boormachine");
        return;
      }
      if (traceCoordinates.length < 1) {
        setStatus("Geen intrede/startpunt van de boorlijn gevonden");
        return;
      }
      item.anchor = [traceCoordinates[0][0], traceCoordinates[0][1]];
      item.center = item.anchor;
      updateMachineLayer();
      sendMachineChanged();
      setStatus(`${item.label || "Machine"} aansluitpunt op de intrede gezet`);
    }

    function rotateMachine(message) {
      const item = targetMachine(message.machineType || "");
      if (!item) {
        setStatus("Plaats eerst een machinevlak");
        return;
      }
      if (message.mode === "drag") {
        machineRotationModeType = item.type || "";
        selectedMachineId = item.id;
        updateMachineLayer();
        setStatus(`${item.label || "Machine"} rotatiemodus: sleep het vlak om vrij te draaien`);
        return;
      }
      const degrees = Number(message.degrees) || 5;
      item.rotation = ((Number(item.rotation) || 0) + degrees + 360) % 360;
      updateMachineLayer();
      sendMachineChanged();
      setStatus(`${item.label || "Machine"} ${degrees} graden gedraaid`);
    }

    function clearMachines() {
      machineItems = [];
      selectedMachineId = "";
      updateMachineLayer();
      sendMachineChanged();
    }

    function escapeHtml(value) {
      return String(value || "").replace(/[&<>"']/g, char => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;" }[char]));
    }

    function traceFeatureCollection() {
      const features = [];
      if (traceCoordinates.length >= 2) {
        features.push({ type: "Feature", properties: { kind: "line" }, geometry: { type: "LineString", coordinates: traceCoordinates } });
      }
      traceCoordinates.forEach((coordinate, index) => {
        features.push({
          type: "Feature",
          properties: { kind: "point", index, role: index === 0 ? "start" : index === traceCoordinates.length - 1 ? "end" : "middle" },
          geometry: { type: "Point", coordinates: coordinate }
        });
      });
      return { type: "FeatureCollection", features };
    }

    function traceLineFeatureCollection() {
      const coordinates = traceDisplayCoordinates();
      return {
        type: "FeatureCollection",
        features: coordinates.length >= 2
          ? [{ type: "Feature", properties: { kind: "line", smooth: traceSmoothVisual }, geometry: { type: "LineString", coordinates } }]
          : []
      };
    }

    function tracePointFeatureCollection() {
      const points = visibleTraceControlPoints();
      return {
        type: "FeatureCollection",
        features: points.map(point => ({
          type: "Feature",
          properties: { kind: "point", index: point.index, role: point.role },
          geometry: { type: "Point", coordinates: point.coordinate }
        }))
      };
    }

    function traceNumberFeatureCollection() {
      const points = visibleTraceControlPoints();
      return {
        type: "FeatureCollection",
        features: points.map(point => ({
          type: "Feature",
          properties: { label: String(point.index + 1) },
          geometry: { type: "Point", coordinates: point.coordinate }
        }))
      };
    }

    function traceLengthFeatureCollection() {
      const features = [];
      if (!traceSmoothVisual) {
        for (let i = 1; i < traceCoordinates.length; i++) {
          const a = traceCoordinates[i - 1];
          const b = traceCoordinates[i];
          features.push({
            type: "Feature",
            properties: { kind: "segment", label: `${Math.round(distanceMeters(a, b))} m` },
            geometry: { type: "Point", coordinates: midpoint(a, b) }
          });
        }
      }
      if (traceCoordinates.length >= 2) {
        features.push({
          type: "Feature",
          properties: { kind: "total", label: `Totaal ${Math.round(traceLengthMeters())} m` },
          geometry: { type: "Point", coordinates: traceCoordinates[traceCoordinates.length - 1] }
        });
      }
      return { type: "FeatureCollection", features };
    }

    function visibleTraceControlPoints() {
      return traceCoordinates.map((coordinate, index) => ({
        coordinate,
        index,
        role: index === 0 ? "start" : index === traceCoordinates.length - 1 ? "end" : "middle"
      }));
    }

    function traceDisplayCoordinates() {
      if (!traceSmoothVisual || traceCoordinates.length < 3) return traceCoordinates;
      return catmullRomTrace(traceCoordinates);
    }

    function catmullRomTrace(points) {
      const result = [];
      const clampIndex = index => Math.max(0, Math.min(points.length - 1, index));
      for (let i = 0; i < points.length - 1; i++) {
        const p0 = points[clampIndex(i - 1)];
        const p1 = points[i];
        const p2 = points[i + 1];
        const p3 = points[clampIndex(i + 2)];
        const steps = Math.max(8, Math.min(24, Math.ceil(distanceMeters(p1, p2) / 2.5)));
        for (let step = 0; step < steps; step++) {
          if (i > 0 && step === 0) continue;
          const t = step / steps;
          result.push([
            catmullRomValue(p0[0], p1[0], p2[0], p3[0], t),
            catmullRomValue(p0[1], p1[1], p2[1], p3[1], t)
          ]);
        }
      }
      result.push(points[points.length - 1]);
      return result;
    }

    function catmullRomValue(p0, p1, p2, p3, t) {
      const t2 = t * t;
      const t3 = t2 * t;
      return 0.5 * ((2 * p1) + (-p0 + p2) * t + (2 * p0 - 5 * p1 + 4 * p2 - p3) * t2 + (-p0 + 3 * p1 - 3 * p2 + p3) * t3);
    }

    function midpoint(a, b) {
      return [(a[0] + b[0]) / 2, (a[1] + b[1]) / 2];
    }

    function updateTraceLayer(silent = false) {
      const lineSource = map.getSource("bore-trace-line-source");
      const pointSource = map.getSource("bore-trace-points-source");
      const numberSource = map.getSource("bore-trace-number-source");
      const lengthSource = map.getSource("bore-trace-length-source");
      if (lineSource && lineSource.setData) lineSource.setData(traceLineFeatureCollection());
      if (pointSource && pointSource.setData) pointSource.setData(tracePointFeatureCollection());
      if (numberSource && numberSource.setData) numberSource.setData(traceNumberFeatureCollection());
      if (lengthSource && lengthSource.setData) lengthSource.setData(traceLengthFeatureCollection());
      updateTraceWidthPaint();
      updateTracePaint();
      updateTraceLayerVisibility();
      renderTraceVectorOverlay();
      renderTraceDomLabels();
      renderBoringInfoLeader();
      updateTracePanel();
      alignProfileMap();
      if (!silent) send({ type: "traceChanged", geojson: traceGeoJson(), points: traceCoordinates.length, length: traceLengthMeters(), rdPoints: traceRdPoints() });
    }

    function updateTraceLayerVisibility() {
      const visible = traceEnabled ? "visible" : "none";
      if (map.getLayer("bore-trace-width")) map.setLayoutProperty("bore-trace-width", "visibility", visible);
      if (map.getLayer("bore-trace-line")) map.setLayoutProperty("bore-trace-line", "visibility", visible);
      if (map.getLayer("bore-trace-points")) map.setLayoutProperty("bore-trace-points", "visibility", visible);
      if (map.getLayer("bore-trace-numbers")) map.setLayoutProperty("bore-trace-numbers", "visibility", traceEnabled && traceNumbersVisible ? "visible" : "none");
      if (map.getLayer("bore-trace-lengths")) map.setLayoutProperty("bore-trace-lengths", "visibility", traceEnabled && traceLengthsVisible ? "visible" : "none");
      bringTraceLayersToFront();
      renderTraceDomLabels();
      renderTraceVectorOverlay();
      renderBoringInfoLeader();
      map.getCanvas().style.cursor = mapLocked
        ? "not-allowed"
        : traceLineDragStart || traceDragIndex >= 0
          ? "grabbing"
          : traceEnabled && traceMoveMode
            ? "move"
            : traceEnabled && traceDrawing
              ? "crosshair"
              : activeMapTool === "select"
                ? "grab"
                : "";
    }

    function renderTraceDomLabels() {
      const container = document.getElementById("traceLabels");
      if (!container) return;
      container.innerHTML = "";
      if (traceEnabled && traceCoordinates.length > 0) {
        if (traceNumbersVisible) {
          visibleTraceControlPoints().forEach(point => {
            addTraceDomLabel(container, point.coordinate, String(point.index + 1), "number", 0, -18);
          });
        }

        if (traceLengthsVisible) {
          if (!traceSmoothVisual) {
            for (let i = 1; i < traceCoordinates.length; i++) {
              const a = traceCoordinates[i - 1];
              const b = traceCoordinates[i];
              addTraceDomLabel(container, midpoint(a, b), `${Math.round(distanceMeters(a, b))} m`, "length", 0, 18);
            }
          }
          if (traceCoordinates.length >= 2) {
            addTraceDomLabel(container, traceCoordinates[traceCoordinates.length - 1], `Totaal ${Math.round(traceLengthMeters())} m`, "total", 34, -24);
          }
        }
      }
      renderKlicCrossingLabels(container);
    }

    function renderKlicCrossingLabels(container) {
      if (!container || !mapReady || !overlays.klic || !Array.isArray(klicCrossingLabels)) return;
      const width = Math.max(1, map.getContainer().clientWidth);
      const height = Math.max(1, map.getContainer().clientHeight);
      klicCrossingLabels.slice(0, 120).forEach((label, index) => {
        const lon = Number(label.lon);
        const lat = Number(label.lat);
        if (!Number.isFinite(lon) || !Number.isFinite(lat)) return;
        const point = map.project([lon, lat]);
        if (point.x < -40 || point.y < -40 || point.x > width + 40 || point.y > height + 40) return;
        const element = document.createElement("div");
        element.className = "trace-label klic-crossing";
        element.textContent = label.code || `K${index + 1}`;
        element.style.left = `${point.x}px`;
        element.style.top = `${point.y - 18}px`;
        const color = typeof label.color === "string" && label.color.startsWith("#") ? label.color : "#0f172a";
        element.style.borderColor = color;
        container.appendChild(element);
      });
    }

    function renderTraceVectorOverlay() {
      const container = document.getElementById("traceOverlay");
      if (!container) return;
      container.innerHTML = "";
      if (!traceEnabled || traceCoordinates.length === 0 || !mapReady) return;

      const width = Math.max(1, map.getContainer().clientWidth);
      const height = Math.max(1, map.getContainer().clientHeight);
      const displayCoordinates = traceDisplayCoordinates();
      const projectedLine = displayCoordinates.map(coordinate => map.project(coordinate));
      const linePoints = projectedLine.map(point => `${round(point.x)},${round(point.y)}`).join(" ");
      const controlPoints = visibleTraceControlPoints().map(point => {
        const projected = map.project(point.coordinate);
        const fill = point.role === "start" ? "#16A34A" : point.role === "end" ? "#DC2626" : "#FFFFFF";
        const radius = point.role === "middle" ? 5 : 7;
        return `<circle cx="${round(projected.x)}" cy="${round(projected.y)}" r="${radius}" fill="${fill}" stroke="#E11D48" stroke-width="2.4" vector-effect="non-scaling-stroke"></circle>`;
      }).join("");

      const lineSvg = projectedLine.length >= 2
        ? `<polyline points="${linePoints}" fill="none" stroke="#E11D48" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" vector-effect="non-scaling-stroke"></polyline>
           <polyline points="${linePoints}" fill="none" stroke="#FFFFFF" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round" opacity=".9" vector-effect="non-scaling-stroke"></polyline>`
        : "";

      container.innerHTML = `<svg viewBox="0 0 ${width} ${height}" preserveAspectRatio="none">${lineSvg}${controlPoints}</svg>`;
    }

    function addTraceDomLabel(container, coordinate, label, className, offsetX = 0, offsetY = 0) {
      const point = map.project(coordinate);
      const element = document.createElement("div");
      element.className = `trace-label ${className || ""}`;
      element.textContent = label;
      element.style.left = `${point.x + offsetX}px`;
      element.style.top = `${point.y + offsetY}px`;
      container.appendChild(element);
    }

    function renderBoringInfoLeader() {
      const container = document.getElementById("boringInfo");
      if (!container) return;
      if (!traceEnabled || !traceInfoVisible || !boringInfo || traceCoordinates.length === 0 || !mapReady) {
        container.innerHTML = "";
        return;
      }

      const anchorCoordinate = traceCoordinateAtRatio(0.58);
      const anchor = map.project(anchorCoordinate);
      const labelX = anchor.x + boringInfoOffset.x;
      const labelY = anchor.y + boringInfoOffset.y;
      const width = Math.max(1, map.getContainer().clientWidth);
      const height = Math.max(1, map.getContainer().clientHeight);
      const title = escapeHtml(boringInfo.title || `Boring Ø${Math.round(traceBoringDiameterMm)} mm`);
      const subtitle = escapeHtml(boringInfo.subtitle || "");
      const contents = Array.isArray(boringInfo.contents) ? boringInfo.contents.slice(0, 6) : [];
      const list = contents.length
        ? `<ul>${contents.map(item => `<li>${escapeHtml(item)}</li>`).join("")}</ul>`
        : "";

      container.innerHTML = `
        <svg viewBox="0 0 ${width} ${height}" preserveAspectRatio="none">
          <line x1="${round(anchor.x)}" y1="${round(anchor.y)}" x2="${round(labelX)}" y2="${round(labelY)}" stroke="#0f172a" stroke-width="1.2" stroke-dasharray="4 3" opacity=".55" vector-effect="non-scaling-stroke"></line>
          <circle cx="${round(anchor.x)}" cy="${round(anchor.y)}" r="4" fill="#ffffff" stroke="#e11d48" stroke-width="1.5" opacity=".9" vector-effect="non-scaling-stroke"></circle>
        </svg>
        <div class="boring-info-card" id="boringInfoCard" style="left:${round(labelX)}px;top:${round(labelY)}px">
          <strong>${title}</strong>
          <span>${subtitle}</span>
          ${list}
        </div>`;

      const card = document.getElementById("boringInfoCard");
      if (card && !card.__boringInfoDragBound) {
        card.__boringInfoDragBound = true;
        card.addEventListener("mousedown", event => {
          if (mapLocked) return;
          event.preventDefault();
          event.stopPropagation();
          const rect = map.getContainer().getBoundingClientRect();
          const localX = event.clientX - rect.left;
          const localY = event.clientY - rect.top;
          const anchorNow = map.project(traceCoordinateAtRatio(0.58));
          boringInfoDrag = { dx: localX - (anchorNow.x + boringInfoOffset.x), dy: localY - (anchorNow.y + boringInfoOffset.y) };
          map.dragPan.disable();
        });
      }
    }

    document.addEventListener("mousemove", event => {
      if (!boringInfoDrag) return;
      const rect = map.getContainer().getBoundingClientRect();
      const localX = event.clientX - rect.left;
      const localY = event.clientY - rect.top;
      const anchor = map.project(traceCoordinateAtRatio(0.58));
      boringInfoOffset = {
        x: localX - boringInfoDrag.dx - anchor.x,
        y: localY - boringInfoDrag.dy - anchor.y
      };
      renderBoringInfoLeader();
    });

    document.addEventListener("mouseup", () => {
      if (!boringInfoDrag) return;
      boringInfoDrag = null;
      if (!map.dragPan.isEnabled()) map.dragPan.enable();
      renderBoringInfoLeader();
    });

    function traceCoordinateAtRatio(ratio) {
      if (traceCoordinates.length === 0) return map.getCenter().toArray();
      if (traceCoordinates.length === 1) return traceCoordinates[0];
      const target = traceLengthMeters() * Math.max(0, Math.min(1, ratio));
      let walked = 0;
      for (let i = 1; i < traceCoordinates.length; i++) {
        const a = traceCoordinates[i - 1];
        const b = traceCoordinates[i];
        const segment = distanceMeters(a, b);
        if (walked + segment >= target || i === traceCoordinates.length - 1) {
          const t = segment <= 0 ? 0 : (target - walked) / segment;
          return [a[0] + (b[0] - a[0]) * t, a[1] + (b[1] - a[1]) * t];
        }
        walked += segment;
      }
      return traceCoordinates[traceCoordinates.length - 1];
    }

    function addTracePoint(lngLat) {
      traceCoordinates.push([lngLat.lng, lngLat.lat]);
      updateTraceLayer();
    }

    function traceGeoJson() {
      return traceCoordinates.length >= 2
        ? { type: "LineString", coordinates: traceCoordinates }
        : null;
    }

    function traceLengthMeters() {
      let length = 0;
      for (let i = 1; i < traceCoordinates.length; i++) {
        length += distanceMeters(traceCoordinates[i - 1], traceCoordinates[i]);
      }
      return length;
    }

    function distanceMeters(a, b) {
      const radius = 6371000;
      const lat1 = a[1] * Math.PI / 180;
      const lat2 = b[1] * Math.PI / 180;
      const dLat = (b[1] - a[1]) * Math.PI / 180;
      const dLng = (b[0] - a[0]) * Math.PI / 180;
      const h = Math.sin(dLat / 2) ** 2 + Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLng / 2) ** 2;
      return radius * 2 * Math.atan2(Math.sqrt(h), Math.sqrt(1 - h));
    }
    function traceRdPoints() {
      return traceCoordinates.map((coordinate, index) => {
        const rd = wgs84ToRd(coordinate[0], coordinate[1]);
        return { index: index + 1, x: rd.x, y: rd.y, role: index === 0 ? "intrede" : index === traceCoordinates.length - 1 ? "uittrede" : "tussenpunt" };
      });
    }

    function updateTracePanel() {
      const modeText = traceMoveMode ? "Verschuifmodus actief" : traceDrawing ? "Tekenmodus actief - klik op de kaart" : "Boorlijn bekijken";
      if (traceEnabled) setStatus(`${modeText} Â· ${traceCoordinates.length} punt(en) Â· ${Math.round(traceLengthMeters())} m`);
      const panel = document.getElementById("tracePanel");
      if (!panel) return;
      panel.classList.toggle("visible", traceEnabled);
      const modeLabel = document.getElementById("traceModeLabel");
      if (modeLabel) modeLabel.textContent = traceMoveMode ? "verschuiven" : traceDrawing ? "bewerken" : "bekijken";
      const editButton = document.getElementById("traceEditButton");
      if (editButton) editButton.classList.toggle("active", traceDrawing && !traceMoveMode);
      const moveButton = document.getElementById("traceMoveButton");
      if (moveButton) moveButton.classList.toggle("active", traceMoveMode);
      const summary = document.getElementById("traceSummary");
      if (summary) summary.textContent = traceCoordinates.length >= 2
        ? `${traceCoordinates.length} punten - ${Math.round(traceLengthMeters())} m totale lengte`
        : traceCoordinates.length === 1 ? "1 punt geplaatst - voeg minimaal een uittredepunt toe" : "Geen boorlijn getekend.";
      const body = document.getElementById("tracePointsBody");
      if (!body) return;
      body.innerHTML = traceRdPoints().map(point => {
        const css = point.role === "intrede" ? "trace-role-start" : point.role === "uittrede" ? "trace-role-end" : "";
        const label = point.role === "intrede" ? "1 in" : point.role === "uittrede" ? `${point.index} uit` : `${point.index}`;
        return `<tr><td class="${css}">${label}</td><td>${point.x.toLocaleString("nl-NL")}</td><td>${point.y.toLocaleString("nl-NL")}</td></tr>`;
      }).join("");
    }

    function setTraceDrawing(enabled) {
      traceDrawing = !!enabled;
      if (traceDrawing) traceMoveMode = false;
      updateTraceLayerVisibility();
      updateTracePanel();
    }

    function setTraceMoveMode(enabled) {
      traceMoveMode = !!enabled;
      if (traceMoveMode) traceDrawing = false;
      traceLineDragStart = null;
      updateTraceLayerVisibility();
      updateTracePanel();
    }

    function clearTrace(startDrawing = true) {
      traceCoordinates = [];
      traceEnabled = true;
      traceDrawing = !!startDrawing;
      traceMoveMode = false;
      updateTraceLayer();
    }

    function smoothTrace() {
      if (traceCoordinates.length < 3) {
        setStatus("Minimaal 3 punten nodig voor een vloeiende boog");
        return;
      }
      traceSmoothVisual = !traceSmoothVisual;
      updateTraceLayer();
      setStatus(traceSmoothVisual ? "Boorlijn wordt vloeiend weergegeven" : "Boorlijn wordt hoekig weergegeven");
    }

    function sendTraceSave() {
      send({ type: "traceSave", geojson: traceGeoJson(), points: traceCoordinates.length, length: traceLengthMeters(), rdPoints: traceRdPoints() });
    }

    function reverseTraceDirection() {
      if (traceCoordinates.length < 2) {
        setStatus("Minimaal 2 punten nodig om richting te wisselen");
        return;
      }
      traceCoordinates.reverse();
      updateTraceLayer();
      setStatus("Intrede en uittrede gewisseld");
    }

    function setTraceState(message) {
      traceEnabled = !!message.enabled;
      traceDrawing = !!message.drawing;
      traceNumbersVisible = message.showNumbers !== false;
      traceLengthsVisible = message.showLengths !== false;
      traceInfoVisible = message.showInfo !== false;
      traceSmoothVisual = message.smooth === true;
      boringInfo = message.boringInfo || boringInfo;
      traceBoringDiameterMm = Number.isFinite(Number(message.boringDiameterMm))
        ? Number(message.boringDiameterMm)
        : traceBoringDiameterMm;
      traceMoveMode = false;
      traceLineDragStart = null;
      if (message.geojson && message.geojson.type === "LineString" && Array.isArray(message.geojson.coordinates)) {
        traceCoordinates = message.geojson.coordinates
          .filter(coordinate => Array.isArray(coordinate) && Number.isFinite(coordinate[0]) && Number.isFinite(coordinate[1]));
      }
      addTraceLayers();
      updateTraceLayer(true);
      alignProfileMap();
      if (workDrawingMode && traceCoordinates.length >= 2) window.setTimeout(() => fitTraceToView(workDrawingScale), 120);
    }

    function suspendMapPanForTraceDrag() {
      traceDragPanWasEnabled = !(map.dragPan && typeof map.dragPan.isEnabled === "function") || map.dragPan.isEnabled();
      if (map.dragPan && typeof map.dragPan.disable === "function") map.dragPan.disable();
    }

    function resumeMapPanAfterTraceDrag() {
      if (!mapLocked && traceDragPanWasEnabled && map.dragPan && typeof map.dragPan.enable === "function") map.dragPan.enable();
      traceDragPanWasEnabled = true;
    }

    function scheduleTraceDragUpdate() {
      traceDragChanged = true;
      if (traceDragRenderFrame) return;
      traceDragRenderFrame = window.requestAnimationFrame(() => {
        traceDragRenderFrame = 0;
        updateTraceLayer(true);
      });
    }

    function finishTraceDrag() {
      if (!traceLineDragStart && traceDragIndex < 0) return;
      traceLineDragStart = null;
      traceDragIndex = -1;
      resumeMapPanAfterTraceDrag();
      if (traceDragRenderFrame) {
        window.cancelAnimationFrame(traceDragRenderFrame);
        traceDragRenderFrame = 0;
      }
      if (traceDragChanged) {
        traceDragChanged = false;
        updateTraceLayer();
      } else {
        updateTraceLayerVisibility();
      }
    }

    function setProfileMode(enabled) {
      profileMode = !!enabled;
      alignProfileMap(true);
    }

    
    function setWorkDrawingMode(enabled, scale = workDrawingScale) {
      workDrawingMode = !!enabled;
      workDrawingScale = Math.max(50, Number(scale) || workDrawingScale || 200);
      updateWorkDrawingChrome();
      setBaseStyle(currentBaseStyleId, workDrawingMode ? false : baseMapVisible);
      applyWorkDrawingPaint();
      updateTraceLayerVisibility();
      if (workDrawingMode && traceCoordinates.length >= 2) window.setTimeout(() => fitTraceToView(workDrawingScale), 180);
      setStatus(workDrawingMode ? `Werktekeningmodus 1:${workDrawingScale} - BGT wit, kadaster donkerblauw, boorlijn rood` : "GIS kaart actief");
    }

    function alignProfileMap(force = false) {
      if (!profileMode || traceCoordinates.length < 2 || !mapReady) return;
      const bearing = traceHorizontalBearing();
      const current = ((map.getBearing() % 360) + 360) % 360;
      const diff = Math.abs((((current - bearing + 540) % 360) - 180));
      if (!force && diff < 0.5) {
        sendTraceProfileMetrics();
        return;
      }
      const centerPoint = traceCenter();
      const canvas = map.getCanvas();
      const desiredPixels = Math.max(220, canvas.clientWidth - 92);
      const metersPerPixel = Math.max(0.05, traceLengthMeters() / desiredPixels);
      const latitudeFactor = Math.max(0.2, Math.cos(centerPoint[1] * Math.PI / 180));
      const zoom = Math.max(12, Math.min(21, Math.log2((40075016.686 * latitudeFactor) / (512 * metersPerPixel))));
      map.easeTo({ center: centerPoint, zoom, bearing, pitch: 0, duration: force ? 450 : 0, essential: true });
      if (force) {
        map.once("moveend", sendTraceProfileMetrics);
        window.setTimeout(sendTraceProfileMetrics, 540);
      } else {
        window.setTimeout(sendTraceProfileMetrics, 40);
      }
    }


    function traceHorizontalBearing() {
      if (traceCoordinates.length < 2) return map.getBearing();
      return (bearingBetween(traceCoordinates[0], traceCoordinates[traceCoordinates.length - 1]) - 90 + 360) % 360;
    }

    function fitTraceToView(scale = workDrawingScale) {
      if (!mapReady || traceCoordinates.length < 2) return;
      const center = traceCenter();
      const bearing = traceHorizontalBearing();
      map.easeTo({ center, bearing, pitch: 0, duration: 220, essential: true });
      window.setTimeout(() => applyMapScale(scale, true), 260);
    }

    // Rotate the map so the boorlijn lies horizontal and fit the whole line in view
    // with some margin — no forced werktekening scale. The report then simply shows
    // the map 1-op-1 as it is on screen. fitBounds computes its zoom on the
    // *unrotated* bounding box (a diagonal line then ends up far too small), so the
    // zoom is derived directly from the trace length versus the container width.
    function fitTraceBoundsHorizontal() {
      if (!mapReady || traceCoordinates.length < 2) return;
      const center = traceCenter();
      const bearing = traceHorizontalBearing();
      const container = map.getContainer();
      const usableWidth = Math.max(220, (container.clientWidth || 900) - 200);
      const lengthMeters = Math.max(10, traceLengthMeters() || 10);
      const metersPerPixel = lengthMeters / usableWidth;
      const latFactor = Math.max(0.2, Math.cos((center[1] || 52) * Math.PI / 180));
      const zoom = Math.max(0, Math.min(19.4, Math.log2((40075016.686 * latFactor) / (512 * metersPerPixel))));
      map.easeTo({ center, bearing, zoom, pitch: 0, duration: 520, essential: true });
      setStatus("Boorlijn horizontaal in beeld");
      window.setTimeout(() => {
        bringTraceLayersToFront();
        renderTraceDomLabels();
        renderTraceVectorOverlay();
      }, 560);
    }

    function zoomForScale(scale, latitude) {
      const denominator = Math.max(50, Number(scale) || 200);
      const metersPerPixel = denominator / 3779.527559;
      const latFactor = Math.max(0.2, Math.cos((Number(latitude) || 52) * Math.PI / 180));
      return Math.max(0, Math.min(22, Math.log2((40075016.686 * latFactor) / (512 * metersPerPixel))));
    }

    function applyMapScale(scale, keepTraceCenter = false) {
      workDrawingScale = Math.max(50, Number(scale) || 200);
      const center = keepTraceCenter && traceCoordinates.length >= 2 ? traceCenter() : map.getCenter().toArray();
      const bearing = (workDrawingMode || profileMode) && traceCoordinates.length >= 2 ? traceHorizontalBearing() : map.getBearing();
      map.easeTo({ center, zoom: zoomForScale(workDrawingScale, center[1]), bearing, pitch: 0, duration: 350, essential: true });
      updateWorkDrawingChrome();
      setStatus(`Werktekeningschaal 1:${workDrawingScale}`);
    }
    function traceCenter() {
      if (!traceCoordinates || traceCoordinates.length === 0) return map.getCenter().toArray();
      const bounds = new maplibregl.LngLatBounds();
      traceCoordinates.forEach(coordinate => bounds.extend(coordinate));
      const center = bounds.getCenter();
      if (!center) return map.getCenter().toArray();
      return [center.lng, center.lat];
    }

    function zoomToBoreline() {
      if (!mapReady || traceCoordinates.length === 0) {
        setStatus("Geen boorlijn beschikbaar om op in te zoomen");
        return;
      }
      if (traceCoordinates.length === 1) {
        map.easeTo({
          center: traceCoordinates[0],
          zoom: Math.max(map.getZoom(), 18),
          bearing: 0,
          pitch: 0,
          duration: 450,
          essential: true
        });
        setStatus("Ingezoomd op boorlijnpunt");
        return;
      }

      const bounds = new maplibregl.LngLatBounds();
      traceCoordinates.forEach(coordinate => bounds.extend(coordinate));
      map.fitBounds(bounds, {
        padding: { top: 110, bottom: 110, left: 110, right: 110 },
        maxZoom: 18.8,
        bearing: 0,
        pitch: 0,
        duration: 520,
        essential: true
      });
      setStatus(`Ingezoomd op boorlijn - ${traceCoordinates.length} punt(en)`);
      window.setTimeout(() => {
        bringTraceLayersToFront();
        renderTraceDomLabels();
        renderTraceVectorOverlay();
      }, 560);
    }

    let pendingSurfaceAnalysisMetrics = false;

    function scheduleSurfaceAnalysisMetrics() {
      pendingSurfaceAnalysisMetrics = true;
      const sendOnce = () => {
        if (!pendingSurfaceAnalysisMetrics) return;
        pendingSurfaceAnalysisMetrics = false;
        window.requestAnimationFrame(() => {
          bringTraceLayersToFront();
          sendTraceProfileMetrics(true);
        });
      };
      if (mapReady) {
        try {
          map.once("idle", sendOnce);
        } catch {
          // Fallback timer below handles maps that cannot emit idle here.
        }
      }
      window.setTimeout(sendOnce, 650);
    }

    function sendTraceProfileMetrics(force = false) {
      if ((!force && !profileMode) || traceCoordinates.length < 2 || !mapReady) return;
      const canvas = map.getCanvas();
      send({
        type: "traceProfileMetrics",
        mapWidth: canvas.clientWidth,
        bgtSurfaceSamples: traceBgtSurfaceSamples(),
        points: traceCoordinates.map((coordinate, index) => {
          const point = map.project(coordinate);
          return { index: index + 1, x: point.x, y: point.y };
        })
      });
    }

    function traceBgtSurfaceSamples() {
      const total = traceLengthMeters();
      const fillLayerIds = projectLayers
        .filter(layer => isBgtProjectLayer(layer) && map.getLayer(`project-fill-${layer.id}`))
        .map(layer => `project-fill-${layer.id}`)
        .filter(layerId => map.getLayoutProperty(layerId, "visibility") !== "none");
      const exactFeatures = projectLayers
        .filter(layer => isBgtProjectLayer(layer) && overlays.bgt !== false && isProjectLayerVisible(layer))
        .flatMap(layer => (layer.featureCollection?.features || [])
          .filter(feature => feature.geometry?.type === "Polygon" || feature.geometry?.type === "MultiPolygon"));
      if (!total || (!fillLayerIds.length && !exactFeatures.length)) return [];

      const samples = [];
      const step = Math.max(0.12, Math.min(0.25, total / 260));
      for (let distance = 0; distance <= total + 0.001; distance += step) {
        const clampedDistance = Math.min(total, distance);
        const surface = dominantBgtSurfaceNearTrace(clampedDistance, fillLayerIds, exactFeatures);
        samples.push({
          distance: clampedDistance,
          label: surface?.label || "Onbekend",
          color: surface?.color || "#F8FAFC"
        });
      }
      return samples;
    }

    function dominantBgtSurfaceNearTrace(distance, fillLayerIds, exactFeatures) {
      const coordinate = interpolateTraceCoordinate(distance);
      const point = map.project(coordinate);
      const centerSurface = bgtSurfaceAtScreenPoint(point, fillLayerIds, exactFeatures);
      if (centerSurface && centerSurface.key !== "overig" && centerSurface.label !== "Onbekend" && bgtSurfaces[centerSurface.key] !== false) {
        return centerSurface;
      }
      const normal = traceScreenNormal(distance);
      const offsets = [0, -8, 8, -16, 16, -26, 26];
      const votes = new Map();
      for (const offset of offsets) {
        const samplePoint = { x: point.x + normal.x * offset, y: point.y + normal.y * offset };
        const surface = bgtSurfaceAtScreenPoint(samplePoint, fillLayerIds, exactFeatures);
        if (!surface || surface.label === "Onbekend" || bgtSurfaces[surface.key] === false) continue;
        const key = surface.key || normalizeBgtSurfaceKey(surface.label);
        const current = votes.get(key) || { surface, score: 0, center: false };
        current.score += offset === 0 ? 2.4 : Math.abs(offset) <= 8 ? 1.4 : 1.0;
        current.center = current.center || offset === 0;
        if (!current.surface || surface.priority > current.surface.priority) current.surface = surface;
        votes.set(key, current);
      }
      if (!votes.size) return bgtSurfaceAtScreenPoint(point, fillLayerIds, exactFeatures);
      const ranked = Array.from(votes.values()).sort((a, b) => {
        const scoreDiff = b.score - a.score;
        if (Math.abs(scoreDiff) > 0.05) return scoreDiff;
        if (a.center !== b.center) return a.center ? -1 : 1;
        return (b.surface?.priority || 0) - (a.surface?.priority || 0);
      });
      return ranked[0]?.surface || null;
    }

    function traceScreenNormal(distance) {
      const total = traceLengthMeters();
      const before = map.project(interpolateTraceCoordinate(Math.max(0, distance - 1)));
      const after = map.project(interpolateTraceCoordinate(Math.min(total, distance + 1)));
      const dx = after.x - before.x;
      const dy = after.y - before.y;
      const length = Math.max(0.001, Math.hypot(dx, dy));
      return { x: -dy / length, y: dx / length };
    }

    function bgtSurfaceAtScreenPoint(point, fillLayerIds, exactFeatures) {
      if (fillLayerIds.length) {
        const features = map.queryRenderedFeatures([point.x, point.y], { layers: fillLayerIds });
        const renderedSurface = chooseBgtSurfaceFeature(features);
        if (renderedSurface && renderedSurface.label !== "Onbekend") {
          return renderedSurface;
        }
      }
      const coordinate = map.unproject([point.x, point.y]).toArray();
      return chooseBgtSurfaceAtCoordinate(coordinate, exactFeatures);
    }

    function chooseBgtSurfaceAtCoordinate(coordinate, features) {
      if (!features || !features.length) return null;
      const candidates = [];
      for (const feature of features) {
        if (!featureContainsCoordinate(feature, coordinate)) continue;
        const surface = bgtSurfaceFromProperties(feature.properties || {});
        if (bgtSurfaces[surface.key] === false) continue;
        candidates.push({
          surface,
          area: featureAreaScore(feature.geometry)
        });
      }
      if (!candidates.length) return null;
      candidates.sort((a, b) => {
        const areaDiff = a.area - b.area;
        if (Math.abs(areaDiff) > 0.0000000001) return areaDiff;
        return b.surface.priority - a.surface.priority;
      });
      return candidates[0].surface;
    }

    function featureContainsCoordinate(feature, coordinate) {
      const geometry = feature.geometry;
      if (!geometry || !geometry.coordinates) return false;
      if (geometry.type === "Polygon") return polygonContainsCoordinate(geometry.coordinates, coordinate);
      if (geometry.type === "MultiPolygon") {
        return geometry.coordinates.some(polygon => polygonContainsCoordinate(polygon, coordinate));
      }
      return false;
    }

    function polygonContainsCoordinate(polygon, coordinate) {
      if (!polygon || !polygon.length || !pointInRing(coordinate, polygon[0])) return false;
      return !polygon.slice(1).some(hole => pointInRing(coordinate, hole));
    }

    function pointInRing(point, ring) {
      if (!ring || ring.length < 3) return false;
      const x = point[0];
      const y = point[1];
      let inside = false;
      for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
        const xi = ring[i][0], yi = ring[i][1];
        const xj = ring[j][0], yj = ring[j][1];
        const intersects = ((yi > y) !== (yj > y)) &&
          (x < (xj - xi) * (y - yi) / ((yj - yi) || 1e-12) + xi);
        if (intersects) inside = !inside;
      }
      return inside;
    }

    function featureAreaScore(geometry) {
      if (!geometry || !geometry.coordinates) return Number.MAX_SAFE_INTEGER;
      if (geometry.type === "Polygon") return polygonAreaScore(geometry.coordinates);
      if (geometry.type === "MultiPolygon") {
        return Math.min(...geometry.coordinates.map(polygonAreaScore));
      }
      return Number.MAX_SAFE_INTEGER;
    }

    function polygonAreaScore(polygon) {
      if (!polygon || !polygon.length) return Number.MAX_SAFE_INTEGER;
      return Math.abs(ringAreaScore(polygon[0])) - polygon.slice(1).reduce((sum, hole) => sum + Math.abs(ringAreaScore(hole)), 0);
    }

    function ringAreaScore(ring) {
      if (!ring || ring.length < 3) return 0;
      let area = 0;
      for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
        area += (ring[j][0] * ring[i][1]) - (ring[i][0] * ring[j][1]);
      }
      return area / 2;
    }

    function interpolateTraceCoordinate(targetDistance) {
      let walked = 0;
      for (let i = 1; i < traceCoordinates.length; i++) {
        const a = traceCoordinates[i - 1];
        const b = traceCoordinates[i];
        const segment = Math.max(0.001, distanceMeters(a, b));
        if (walked + segment >= targetDistance || i === traceCoordinates.length - 1) {
          const ratio = Math.max(0, Math.min(1, (targetDistance - walked) / segment));
          return [
            a[0] + (b[0] - a[0]) * ratio,
            a[1] + (b[1] - a[1]) * ratio
          ];
        }
        walked += segment;
      }
      return traceCoordinates[traceCoordinates.length - 1];
    }

    function chooseBgtSurfaceFeature(features) {
      if (!features || !features.length) return { label: "Onbekend", color: "#F8FAFC" };
      const candidates = features
        .map(feature => ({
          surface: bgtSurfaceFromProperties(feature.properties || {}),
          area: featureAreaScore(feature.geometry)
        }))
        .filter(candidate => candidate.surface && candidate.surface.label !== "Onbekend" && bgtSurfaces[candidate.surface.key] !== false);
      if (!candidates.length) return { label: "Onbekend", color: "#F8FAFC" };
      candidates.sort((a, b) => {
        const areaDiff = a.area - b.area;
        if (Math.abs(areaDiff) > 0.0000000001) return areaDiff;
        return b.surface.priority - a.surface.priority;
      });
      return candidates[0].surface;
    }

    function bgtSurfaceFromProperties(properties) {
      const combined = `${properties.objectType || ""} ${properties.theme || ""} ${properties.sourceName || ""} ${properties.bgtType || ""} ${properties.Functie || ""} ${properties["Functie plus"] || ""} ${properties["Fysiek voorkomen"] || ""} ${properties["Fysiek voorkomen plus"] || ""} ${properties.Klasse || ""}`
        .replaceAll("_", " ")
        .replaceAll("-", " ")
        .toLowerCase();
      const functie = `${properties.Functie || ""} ${properties["Functie plus"] || ""}`.replaceAll("_", " ").replaceAll("-", " ").toLowerCase();
      const fysiek = `${properties["Fysiek voorkomen"] || ""} ${properties["Fysiek voorkomen plus"] || ""} ${properties.Klasse || ""}`.replaceAll("_", " ").replaceAll("-", " ").toLowerCase();
      const typeText = `${properties.objectType || ""} ${properties.theme || ""} ${properties.sourceName || ""} ${properties.bgtType || ""}`.replaceAll("_", " ").replaceAll("-", " ").toLowerCase();
      const explicitWater = typeText.includes("waterdeel") || typeText.includes("waterbody") || typeText.includes("waterloop");
      if (combined.includes("spoor")) return bgtSurfaceByKey("spoor");
      if (explicitWater || functie.includes("water") || fysiek.includes("water") || combined.includes(" water ")) return bgtSurfaceByKey("water");
      if (functie.includes("berm") || functie.includes("groenvoorziening") || functie.includes("plantsoen") || functie.includes("vegetatie") ||
        fysiek.includes("groenvoorziening") || fysiek.includes("gras") || fysiek.includes("kruid") || fysiek.includes("bos")) return bgtSurfaceByKey("groenstrook");
      if (functie.includes("rijbaan") || functie.includes("fietspad") || functie.includes("voetpad") || fysiek.includes("asfalt") || fysiek.includes("gesloten verharding")) return bgtSurfaceByKey("asfalt");
      if (combined.includes("pand") || combined.includes("gebouw") || combined.includes("building")) return bgtSurfaceByKey("bebouwing");
      if (combined.includes("onbegroeid") || combined.includes("open verharding") || combined.includes("zand") || combined.includes("gravel")) return bgtSurfaceByKey("onverhard");
      if (combined.includes("begroeid") || combined.includes("vegetatie") || combined.includes("groen") || combined.includes("plantcover")) return bgtSurfaceByKey("groenstrook");
      if (combined.includes("ondersteunend wegdeel")) return bgtSurfaceByKey("groenstrook");
      if (combined.includes("wegdeel") || combined.includes("road") || combined.includes("traffic")) return bgtSurfaceByKey("asfalt");
      if (properties.surface) {
        const key = normalizeBgtSurfaceKey(properties.surface);
        return bgtSurfaceByKey(key, properties.surfaceLabel || properties.surface, properties.surfaceColor || properties.color);
      }
      return bgtSurfaceByKey("overig", properties.objectType || properties.theme || "BGT", properties.color);
    }

    function normalizeBgtSurfaceKey(value) {
      const text = `${value || ""}`.replaceAll("_", " ").replaceAll("-", " ").toLowerCase();
      if (text.includes("water")) return "water";
      if (text.includes("berm")) return "groenstrook";
      if (text.includes("asfalt") || text.includes("wegdeel") || text.includes("verharding") || text.includes("rijbaan")) return "asfalt";
      if (text.includes("groen") || text.includes("begroeid") || text.includes("vegetatie") || text.includes("plantcover") ||
        text.includes("gras") || text.includes("kruid") || text.includes("bos")) return "groenstrook";
      if (text.includes("onverhard") || text.includes("zand") || text.includes("gravel")) return "onverhard";
      if (text.includes("bebouwing") || text.includes("pand") || text.includes("gebouw") || text.includes("building")) return "bebouwing";
      if (text.includes("spoor")) return "spoor";
      return "overig";
    }

    function bgtSurfaceByKey(key, label, color) {
      const styles = {
        asfalt: { label: "asfalt", color: "#CBD5E1", priority: 100 },
        water: { label: "water", color: "#7DD3FC", priority: 90 },
        spoor: { label: "spoor", color: "#9CA3AF", priority: 85 },
        bebouwing: { label: "bebouwing", color: "#D1D5DB", priority: 80 },
        onverhard: { label: "onverhard", color: "#FDE68A", priority: 60 },
        groenstrook: { label: "groenstrook", color: "#86EFAC", priority: 40 },
        overig: { label: label || "BGT overig", color: color || "#E2E8F0", priority: 10 }
      };
      const style = styles[key] || styles.overig;
      return { key: key || "overig", label: label || style.label, color: color || style.color, priority: style.priority };
    }

    function bearingBetween(a, b) {
      const lat1 = a[1] * Math.PI / 180;
      const lat2 = b[1] * Math.PI / 180;
      const dLng = (b[0] - a[0]) * Math.PI / 180;
      const y = Math.sin(dLng) * Math.cos(lat2);
      const x = Math.cos(lat1) * Math.sin(lat2) - Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLng);
      return ((Math.atan2(y, x) * 180 / Math.PI) + 360) % 360;
    }

    function registerTraceInteractions() {
      if (map.__boreTraceInteractionsRegistered) return;
      map.__boreTraceInteractionsRegistered = true;

      map.on("click", "bore-trace-line", event => {
        if (mapLocked) return;
        if (!traceEnabled || !traceDrawing || !event.lngLat || traceCoordinates.length < 2) return;
        suppressFollowingMapClick();
        const insertAt = nearestTraceSegmentIndex(event.point);
        traceCoordinates.splice(insertAt + 1, 0, [event.lngLat.lng, event.lngLat.lat]);
        updateTraceLayer();
      });

      map.on("mousedown", "bore-trace-line", event => {
        if (mapLocked) return;
        if (!traceEnabled || !traceMoveMode || !event.lngLat || traceCoordinates.length < 1) return;
        event.preventDefault();
        if (event.originalEvent) {
          event.originalEvent.preventDefault();
          event.originalEvent.stopPropagation();
        }
        suppressFollowingMapClick();
        traceDragChanged = false;
        suspendMapPanForTraceDrag();
        traceLineDragStart = event.lngLat;
        map.getCanvas().style.cursor = "grabbing";
      });

      map.on("mousedown", "bore-trace-points", event => {
        if (mapLocked) return;
        if (!traceEnabled || !traceDrawing || !event.features?.length) return;
        event.preventDefault();
        if (event.originalEvent) {
          event.originalEvent.preventDefault();
          event.originalEvent.stopPropagation();
        }
        suppressFollowingMapClick();
        traceDragChanged = false;
        suspendMapPanForTraceDrag();
        traceDragIndex = Number(event.features[0].properties.index);
        map.getCanvas().style.cursor = "grabbing";
      });

      map.on("mousemove", event => {
        if (mapLocked) return;
        if (traceLineDragStart) {
          const dx = event.lngLat.lng - traceLineDragStart.lng;
          const dy = event.lngLat.lat - traceLineDragStart.lat;
          traceCoordinates = traceCoordinates.map(coordinate => [coordinate[0] + dx, coordinate[1] + dy]);
          traceLineDragStart = event.lngLat;
          scheduleTraceDragUpdate();
          return;
        }
        if (traceDragIndex < 0) return;
        traceCoordinates[traceDragIndex] = [event.lngLat.lng, event.lngLat.lat];
        scheduleTraceDragUpdate();
      });

      map.on("mouseup", finishTraceDrag);
      map.on("mouseleave", finishTraceDrag);

      map.on("contextmenu", "bore-trace-points", event => {
        if (mapLocked) return;
        if (!traceEnabled || !traceDrawing || !event.features?.length) return;
        event.preventDefault();
        const index = Number(event.features[0].properties.index);
        if (Number.isInteger(index) && index >= 0) {
          traceCoordinates.splice(index, 1);
          updateTraceLayer();
        }
      });

      map.on("mouseenter", "bore-trace-line", () => { if (traceEnabled) map.getCanvas().style.cursor = traceDrawing ? "copy" : "pointer"; });
      map.on("mouseenter", "bore-trace-points", () => { if (traceEnabled) map.getCanvas().style.cursor = traceDrawing ? "grab" : "pointer"; });
      map.on("mouseleave", "bore-trace-line", updateTraceLayerVisibility);
      map.on("mouseleave", "bore-trace-points", updateTraceLayerVisibility);
    }

    function nearestTraceSegmentIndex(point) {
      let bestIndex = 0;
      let bestDistance = Infinity;
      for (let i = 0; i < traceCoordinates.length - 1; i++) {
        const a = map.project(traceCoordinates[i]);
        const b = map.project(traceCoordinates[i + 1]);
        const d = pointSegmentDistance(point, a, b);
        if (d < bestDistance) {
          bestDistance = d;
          bestIndex = i;
        }
      }
      return bestIndex;
    }

    function pointSegmentDistance(p, a, b) {
      const dx = b.x - a.x;
      const dy = b.y - a.y;
      if (dx === 0 && dy === 0) return Math.hypot(p.x - a.x, p.y - a.y);
      const t = Math.max(0, Math.min(1, ((p.x - a.x) * dx + (p.y - a.y) * dy) / (dx * dx + dy * dy)));
      return Math.hypot(p.x - (a.x + t * dx), p.y - (a.y + t * dy));
    }
    function setBaseStyle(styleId, visible = baseMapVisible) {
      const requestedStyleId = styleId || currentBaseStyleId || "pdok-brt";
      const nextStyleId = borelineMapMode && !borelineBaseStyles.has(requestedStyleId) ? "pdok-brt" : requestedStyleId;
      const nextVisible = visible !== false;
      if (currentBaseStyleId === nextStyleId && baseMapVisible === nextVisible) return;
      currentBaseStyleId = nextStyleId;
      baseMapVisible = nextVisible;
      const view = {
        center: map.getCenter(),
        zoom: map.getZoom(),
        bearing: map.getBearing(),
        pitch: map.getPitch()
      };

      map.setStyle(baseMapVisible ? (baseStyles[currentBaseStyleId] || baseStyles["pdok-brt"]) : emptyBaseStyle);
      map.once("style.load", () => {
        map.jumpTo(view);
        addOverlayLayers();
        addProjectLayers();
        addTraceLayers();
        addBroSoundingLayers();
        addMachineLayers();
        addMapToolLayers();
        updateTraceLayer(true);
        updateBroSoundingLayers();
        updateMachineLayer();
        updateMapToolLayers();
        send({ type: "traceRefreshRequest", phase: "style.load" });
      });
      map.once("idle", () => {
        map.jumpTo(view);
        addOverlayLayers();
        addProjectLayers();
        addTraceLayers();
        addBroSoundingLayers();
        addMachineLayers();
        addMapToolLayers();
        updateTraceLayer(true);
        updateBroSoundingLayers();
        updateMachineLayer();
        updateMapToolLayers();
        send({ type: "traceRefreshRequest", phase: "idle" });
      });
    }

    function syncOverlayVisibility() {
      for (const [id, visible] of Object.entries(overlays)) {
        if (map.getLayer(id)) map.setLayoutProperty(id, "visibility", visible ? "visible" : "none");
      }
    }

    function handleMessage(message) {
      if (!mapReady && message.type !== "reset") return;
      if (shouldIgnoreDuplicateCommand(message)) return;
      if (message.type === "zoomIn") map.zoomIn();
      if (message.type === "zoomOut") map.zoomOut();
      if (message.type === "reset") map.flyTo({ center, zoom: 13.8, essential: true });
      if (message.type === "mapLock") setMapLocked(message.locked);
      if (message.type === "restoreCamera") restoreCamera(message.camera);
      if (message.type === "traceState") setTraceState(message);
      if (message.type === "broSoundings") setBroSoundings(message);
      if (message.type === "fitBroSoundings") fitBroSoundings();
      if (message.type === "traceClear") clearTrace(true);
      if (message.type === "traceSaveRequest") sendTraceSave();
      if (message.type === "traceSmooth") smoothTrace();
      if (message.type === "traceMoveMode") setTraceMoveMode(!traceMoveMode);
      if (message.type === "traceReverse") reverseTraceDirection();
      if (message.type === "profileMode") setProfileMode(message.enabled);
      if (message.type === "workDrawingMode") setWorkDrawingMode(message.enabled, message.scale);
      if (message.type === "fitTrace") {
        if (message.fit === "bounds") fitTraceBoundsHorizontal();
        else fitTraceToView(message.scale || workDrawingScale);
      }
      if (message.type === "zoomToBoreline") zoomToBoreline();
      if (message.type === "mapScale") applyMapScale(message.scale || workDrawingScale, true);
      if (message.type === "machineState") setMachineState(message);
      if (message.type === "machinePlace") startMachinePlacement(message);
      if (message.type === "machineUpdateSelected") updateSelectedMachineSize(message);
      if (message.type === "machineAlignTrace") alignMachineToTrace(message);
      if (message.type === "machineSnapToTraceStart") snapMachineToTraceStart(message);
      if (message.type === "machineRotate") rotateMachine(message);
      if (message.type === "machineClear") clearMachines();
      if (message.type === "machineStop") {
        machinePlacementMode = false;
        setStatus("Machine plaatsen gestopt");
      }
      if (message.type === "featureInfoMode") {
        featureInfoMode = !!message.enabled;
        if (featureInfoMode) machinePlacementMode = false;
        if (!featureInfoMode && activeFeaturePopup) activeFeaturePopup.remove();
        setStatus(featureInfoMode ? "Infomodus actief - klik op BGT/KLIC voor gegevens" : "Handmodus actief - kaart verplaatsen zonder popups");
      }
      if (message.type === "profileAlignRequest") alignProfileMap(true);
      if (message.type === "resize") { map.resize(); map.triggerRepaint(); window.setTimeout(() => { map.resize(); map.triggerRepaint(); }, 60); }
      if (message.type === "recover") { forceMapRecover(); }
      if (message.type === "reportCaptureMode") {
        document.body.classList.toggle("report-capture", !!message.enabled);
        document.body.classList.toggle("capture-controls-hidden", !!message.enabled);
        updateTracePaint();
        bringTraceLayersToFront();
        updateBroSoundingLayers();
        renderTraceVectorOverlay();
        map.resize();
        window.setTimeout(() => {
          updateTracePaint();
          bringTraceLayersToFront();
          updateBroSoundingLayers();
          renderTraceVectorOverlay();
          map.resize();
          map.triggerRepaint();
        }, 80);
      }
      if (message.type === "klicCrossingLabels") {
        klicCrossingLabels = Array.isArray(message.labels) ? message.labels : [];
        renderTraceDomLabels();
      }
      if (message.type === "base") {
        setBaseStyle(message.id, baseMapVisible);
        sendMapStateChanged("base");
      }
      if (message.type === "overlay") {
        if (message.id === "machines") {
          machinesEnabled = !!message.visible;
          updateMachineLayer();
          sendMapStateChanged("overlay");
          return;
        }
        if (message.id === "baseMap") {
          setBaseStyle(currentBaseStyleId, !!message.visible);
          sendMapStateChanged("overlay");
          return;
        }
        overlays[message.id] = !!message.visible;
        addOverlayLayers();
        syncOverlayVisibility();
        addProjectLayers();
        applyAllProjectLayerFilters();
        updateMachineLayer();
        sendMapStateChanged("overlay");
      }
      if (message.type === "klicTheme") {
        klicThemes[message.theme] = !!message.visible;
        addProjectLayers();
        applyAllProjectLayerFilters();
        updateMachineLayer();
        sendMapStateChanged("klicTheme");
      }
      if (message.type === "bgtSurfaceFilter") {
        Object.assign(bgtSurfaces, message.surfaces || {});
        addProjectLayers();
        applyAllProjectLayerFilters();
        updateMachineLayer();
        sendTraceProfileMetrics();
        sendMapStateChanged("bgtSurfaceFilter");
      }
      if (message.type === "projectLayerVisibility") {
        projectLayerVisibility[message.layerId] = message.visible !== false;
        applyAllProjectLayerFilters();
        updateMachineLayer();
        sendTraceProfileMetrics();
        sendMapStateChanged("projectLayerVisibility");
      }
      if (message.type === "projectLayers") {
        workDrawingMode = message.workDrawingMode === true;
        borelineMapMode = message.borelineMapMode === true;
        document.body.classList.toggle("boreline-map-mode", borelineMapMode);
        if (borelineMapMode) {
          setActiveMapTool("select", true);
        }
        const requestedBaseVisible = workDrawingMode ? false : message.baseMapVisible !== false;
        Object.assign(projectLayerVisibility, message.projectLayerVisibility || {});
        overlays.parcels = message.parcelsVisible === true;
        overlays.buildings = message.buildingsVisible === true;
        overlays.addresses = message.addressesVisible === true;
        overlays.bgt = message.bgtVisible !== false;
        overlays.bagImport = message.bagImportVisible !== false;
        overlays.ahn4Dtm = workDrawingMode ? false : message.ahn4DtmVisible === true;
        overlays.ahn4Dsm = workDrawingMode ? false : message.ahn4DsmVisible === true;
        overlays.broGeomorphology = workDrawingMode ? false : message.broGeomorphologyVisible === true;
        overlays.broSoilMap = workDrawingMode ? false : message.broSoilMapVisible === true;
        overlays.broGroundwaterGhg = workDrawingMode ? false : message.broGroundwaterGhgVisible === true;
        overlays.broGroundwaterGlg = workDrawingMode ? false : message.broGroundwaterGlgVisible === true;
        overlays.broGroundwaterGvg = workDrawingMode ? false : message.broGroundwaterGvgVisible === true;
        overlays.broGroundwaterGt = workDrawingMode ? false : message.broGroundwaterGtVisible === true;
        overlays.broGroundwaterDocumentation = workDrawingMode ? false : message.broGroundwaterDocumentationVisible === true;
        overlays.klic = workDrawingMode ? false : message.klicVisible !== false;
        overlays.klicBuffer = workDrawingMode ? false : message.klicBufferVisible !== false;
        overlays.designImport = workDrawingMode ? false : message.designImportVisible !== false;
        overlays.customImport = workDrawingMode ? false : message.customImportVisible !== false;
        Object.assign(klicThemes, message.klicThemes || {});
        Object.assign(bgtSurfaces, message.bgtSurfaces || {});
        updateWorkDrawingChrome();
        syncOverlayVisibility();
        setProjectLayers(message.layers);
        applyAllProjectLayerFilters();
        setBaseStyle(currentBaseStyleId, requestedBaseVisible);
        applyWorkDrawingPaint();
        addTraceLayers();
        addBroSoundingLayers();
        bringTraceLayersToFront();
        updateBroSoundingLayers();
        updateMachineLayer();
        sendMapStateChanged("projectLayers");
      }
      if (message.type === "surfaceAnalysisRequest") {
        addTraceLayers();
        updateTraceLayer(true);
        bringTraceLayersToFront();
        updateTraceLayerVisibility();
        scheduleSurfaceAnalysisMetrics();
      }
      if (message.type === "featureDetail") applyFeatureDetail(message);
      if (message.type === "environmentHighlight") setEnvironmentHighlight(message);
      if (message.type === "save") {
        send({ type: "saved", message: "Kaartbeeld opgeslagen.", camera: currentCamera() });
      }
    }

    function shouldIgnoreDuplicateCommand(message) {
      if (!message || !dedupeCommandTypes.has(message.type)) return false;
      const key = JSON.stringify(message);
      const now = Date.now();
      if (key === lastCommandKey && now - lastCommandAt < 350) return true;
      lastCommandKey = key;
      lastCommandAt = now;
      return false;
    }

    function wgs84ToRd(lon, lat) {
      const dLat = 0.36 * (lat - 52.15517440);
      const dLon = 0.36 * (lon - 5.38720621);
      const x = 155000
        + 190094.945 * dLon
        - 11832.228 * dLat * dLon
        - 114.221 * dLat * dLat * dLon
        - 32.391 * Math.pow(dLon, 3)
        - 0.705 * dLat
        - 2.340 * Math.pow(dLat, 3) * dLon
        - 0.608 * dLat * Math.pow(dLon, 3)
        - 0.008 * dLon * dLon
        + 0.148 * dLat * dLat * Math.pow(dLon, 3);
      const y = 463000
        + 309056.544 * dLat
        + 3638.893 * dLon * dLon
        + 73.077 * dLat * dLat
        - 157.984 * dLat * dLon * dLon
        + 59.788 * Math.pow(dLat, 3)
        + 0.433 * dLon
        - 6.439 * dLat * dLat * dLon * dLon
        - 0.032 * dLat * dLon
        + 0.092 * Math.pow(dLon, 4)
        - 0.054 * dLat * Math.pow(dLon, 4);
      return { x: Math.round(x), y: Math.round(y) };
    }

    function send(payload) {
      if (window.chrome && window.chrome.webview) window.chrome.webview.postMessage(payload);
    }

    function prepareReportCapture() {
      document.body.classList.add("report-capture");
      document.body.classList.add("capture-controls-hidden");
      updateTracePaint();
      bringTraceLayersToFront();
      updateTraceLayerVisibility();
      map.resize();
      map.triggerRepaint();

      // A capture is only worth taking once the basemap/BGT tiles have actually
      // painted. map.loaded() can already be true while tiles are still loading or
      // while the GPU surface is degraded, so we additionally require
      // areTilesLoaded() and force a couple of repaints before resolving.
      // We also refuse to capture while a camera animation is still running
      // (e.g. "Boorlijn horizontaal" / fitBounds): a mid-animation frame would put a
      // scheef/half-gedraaid kaartbeeld in the report.
      const tilesPainted = () => {
        try {
          if (typeof map.isMoving === "function" && map.isMoving()) return false;
        } catch (err) { /* ignore */ }
        try {
          if (typeof map.areTilesLoaded === "function" && !map.areTilesLoaded()) return false;
        } catch (err) { /* older maplibre: fall back to loaded() */ }
        return map.isStyleLoaded() && map.loaded();
      };

      return new Promise(resolve => {
        const startedAt = Date.now();
        let settled = false;
        const buildResult = reason => ({
          ready: tilesPainted(),
          reason,
          elapsedMs: Date.now() - startedAt,
          width: map.getContainer().clientWidth,
          height: map.getContainer().clientHeight,
          zoom: map.getZoom(),
          center: currentCamera().center,
          bearing: map.getBearing(),
          pitch: map.getPitch(),
          baseLayer: currentBaseStyleId,
          baseMapVisible,
          tilesLoaded: (() => { try { return typeof map.areTilesLoaded === "function" ? map.areTilesLoaded() : null; } catch (err) { return null; } })()
        });
        const finish = reason => {
          if (settled) return;
          settled = true;
          map.off("idle", onIdle);
          window.clearInterval(poll);
          window.clearTimeout(timeout);
          // Give the compositor one more frame with the final layout before the
          // host grabs the snapshot.
          map.resize();
          map.triggerRepaint();
          window.setTimeout(() => {
            map.triggerRepaint();
            window.setTimeout(() => resolve(buildResult(reason)), 140);
          }, 140);
        };
        const onIdle = () => { if (tilesPainted()) finish("idle"); };

        // Hard cap so the host is never blocked indefinitely.
        const timeout = window.setTimeout(() => finish(tilesPainted() ? "painted-timeout" : "timeout"), 3200);
        // Poll because "idle" may already have fired before we attached, and tiles
        // can finish between idle events.
        const poll = window.setInterval(() => {
          map.triggerRepaint();
          if (tilesPainted() && Date.now() - startedAt >= 260) finish("painted");
        }, 120);
        map.once("idle", onIdle);
      });
    }

    if (window.chrome && window.chrome.webview) {
      window.chrome.webview.addEventListener("message", event => handleMessage(event.data));
    }

    window.borevexaOpenDocument = id => send({ type: "openDocument", id });
    function diagnostics() {
      try {
        const c = map.getCanvas();
        return {
          hasMap: true,
          loaded: map.loaded(),
          styleLoaded: map.isStyleLoaded(),
          tilesLoaded: (typeof map.areTilesLoaded === "function") ? map.areTilesLoaded() : null,
          canvasW: c ? c.width : null,
          canvasH: c ? c.height : null,
          containerW: map.getContainer().clientWidth,
          containerH: map.getContainer().clientHeight,
          zoom: Math.round(map.getZoom() * 100) / 100,
          contextLost: webglContextLost,
          baseStyle: (typeof currentBaseStyleId !== "undefined") ? currentBaseStyleId : null,
          sources: (() => { try { return Object.keys(map.getStyle().sources || {}); } catch (e) { return "err:" + e; } })(),
          layers: (() => { try { return (map.getStyle().layers || []).length; } catch (e) { return -1; } })(),
          errors: mapDiagErrors.slice(-10)
        };
      } catch (err) {
        return { error: String(err) };
      }
    }
    window.borevexaMap = { handleMessage, prepareReportCapture, diagnostics, forceRecover: forceMapRecover };
  </script>
</body>
